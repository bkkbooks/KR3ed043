body:
  text: 卷二春月諸症治例內經曰春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少大法春月天氣上升人氣亦上升應之或春月諸症宜吐發散升提不宜降下通利蓋吐即古之宣劑今人謂宣為瀉者誤也春月肝膽木氣用事木旺則土虧故脾胃土氣受邪宜抑肝補脾藥為主清肺養心藥佐之隨症施治全在活法虛則補之實則瀉之寒則溫之熱則清之高者抑之下者舉之以平為期余皆仿此今將春月諸症宜用方法詳陳於下對症施藥權而用之毋膠柱而鼓瑟始可以言醫矣故曰醫者易也芎芷藿蘇散四十九治春初人參勞擾飢飽失節或解衣沐浴觸冒風寒致成內傷外感頭疼發熱嘔吐眩悶膈脹痛惡食或鼻流清涕咳嗽生痰鼻塞聲重並宜服一二劑即愈仍忌腥葷三五日川芎一錢白芷八分細辛五分去葉乾葛一錢甘草三分生紫蘇葉一錢藿香八分去土半夏一錢薑製陳皮八分蒼朮麩炒一錢枳殼去穰七分桔梗去蘆七分淡豆豉八分不用亦可上用薑三片蔥白一根水一鍾半煎八分食後熱服有汗不用蔥白單內傷無外感單外感無內傷各有本條頭痛不止加藁本八分嘔吐不止加乾薑炒砂仁炒各七分發熱或潮熱不退加柴胡黃芩各一錢胸膈脹悶加山楂枳實各一錢發而汗不出熱不退加麻黃一錢半蔥白二根咳嗽生痰加杏仁前胡金沸花去梗各八分南五味子五分芎蘇香葛散五十治春月感冒傷寒及山嵐瘴毒癘氣人感觸之頭疼身痛惡寒發熱人迎脈浮大者是紫蘇葉去梗一錢香附炒白茯苓去皮乾葛藿香半夏制前胡去蘆陳皮川芎各八分白芷防風去蘆各七分甘草三分蒼朮一錢五分羌活一錢上用薑三片蔥白連須二根水二鍾煎一鍾熱服厚被覆汗出為度無汗再服忌雞魚豬羊肉九味羌活湯五十一解利春夏秋傷寒熱病極穩羌活一錢防風一錢蒼朮一錢五分川芎一錢黃芩一錢白芷一錢甘草五分細辛五分生地黃一錢不用亦效上用薑三片蔥白一根水二鍾煎一鍾熱服以汗為度無汗再服汗原多去蒼朮加白朮一錢渴加石膏一錢熱甚加柴胡山梔各一錢胸膈脹悶加枳殼桔梗各七分六神通解散五十二治春末夏初傷寒並時行熱病發表甚捷凡瘟疫初起預用藿香正氣煎一大鍋每人服一碗以防未然若已病用前九味羌活湯並此服之皆有奇效麻黃去根節一錢防風一錢半黃芩石膏細末滑石細末各二錢半蒼朮四錢甘草一錢上用薑三片蔥白五寸淡豆豉五十粒水二大鐘煎一大鐘熱服微汗周身即解一云南方春夏用防風秋冬用麻黃北方春夏依本方秋冬倍麻黃芎芷香蘇散五十三治春月傷風鼻塞聲重或流清涕咳嗽痰壅氣逆人迎脈浮緩者是川芎白芷蘇葉紫者去梗香附各一錢陳皮防風羌活各八分甘草五分上用薑三片蔥白三寸水一鍾半煎八分食後熱服有痰加半夏一錢咳嗽加杏仁桑白皮各八分五味子十粒加減藿香正氣散五十四治非時傷寒頭疼憎寒壯熱痞悶嘔吐時行疫癘山嵐瘴瘧不服水土等症藿香一錢五分白芷川芎紫蘇葉半夏蒼朮各一錢白朮白茯苓陳皮厚朴薑製各八分甘草三分上用薑三片棗一枚水二鍾煎一鍾食遠熱服加減補中益氣湯五十五治飲食勞力讀書刻苦勤政傷神飢飽失時症類瘧狀發熱頭疼惡寒身強體痛苦勞極復感風寒則頭疼如破全似外感傷寒之症誤用發表之藥鮮不傷人故東垣先生髮內外傷辨首用此方取濟甚衆蓋內傷之脈右手氣口三倍大於左手人迎東垣辨法甚詳茲不復贅人參一錢半去蘆黃耆一錢半蜜炙白朮一錢當歸一錢酒洗甘草炙七分陳皮八分升麻五分柴胡五分加半夏一錢二分黃柏八分茯神棗仁貝母甘枸杞各一錢二分按此方用升麻柴胡能升提陽氣下陷蓋柴胡能使胃中之清氣左旋而上達升麻能使胃中之清氣右旋而上升有此妙用人多不考上用薑三片棗一枚水二鍾煎八分食遠服或加黃柏五分以救腎水而瀉胃中伏火尤妙如身大熱只一服氣和微汗而愈夏月神短加麥門冬五味子口乾加葛根身刺痛乃少血加當歸頭痛加川芎蔓荊子頭頂痛加藁本細辛諸頭痛並用此四味有痰加半夏生薑咳嗽春加川芎佛耳草夏加黃芩麥門冬五味子秋加黃芩麻黃金沸草冬加款冬花馬兜苓久嗽乃肺中伏火去參耆飲食不下乃胃中有寒或氣滯春加青皮陳皮木香冬加益志仁草豆蔻仁夏加芩連秋加檳榔砂仁心下痞加枳實黃連白芍藥腹脹加枳實木香砂仁厚朴天寒加薑桂腹痛加白芍藥炙甘草有寒加桂心夏月加黃芩甘草芍藥冬加半夏益志仁草豆蔻脅痛加砂仁柴胡甘草白芍藥如臍下痛加熟地黃不止乃是寒加官桂腳軟加黃柏防己附子理中湯五十六治房勞內傷寒邪中陰面青腹痛六脈沉微無頭疼無大熱者宜用若陽厥並陽症似陰誤服必致夭人慎之慎之人參去蘆二錢半白朮土炒二錢甘草炙一錢乾薑泡二錢附子生二錢倍甘草去參朮名四逆湯加川芎鹿茸各一錢半名三建湯若在疑似只以炙法並熱鹽尉甚穩上用水一鍾半薑五片煎七分溫服飲食內傷亦頭疼發熱胸膈嘔吐俗呼夾食傷寒兩寸脈弦緊右關脈洪大關沉濡者是此當分治不可混一蓋飲者水也傷無形之氣食者物也傷有形之血生薑五苓湯五十七治大飲冷水傷脾過飲酒而傷氣生薑豬苓澤瀉白朮白茯苓半夏枳實各一錢甘草三分上用水一鍾半煎七分溫服取小汗此治傷飲之輕者若重而水蓄積為脹滿者本方去甘草加大戟長流水煮三次去皮曬乾七分芫花醋浸炒乾甘遂麵包煨去面去心各八分黑牽牛研末二錢檳榔一錢用水二鍾煎一鍾空心服利水盡即愈半夏神麯湯五十八治過食寒冷硬物及生瓜果致傷太陰厥陰或嘔吐痞悶腸澼或腹痛惡食此治傷之輕者陳皮一錢白朮一錢五分半夏一錢二分乾薑炒八分神麯炒一錢三稜醋炒莪朮醋炒白茯苓去皮山楂去核枳實炒各一錢砂仁七分炒麥芽炒八分上用薑三片煎熱服不拘時神保丸五十九消一切生冷積滯此治傷之重者全蠍乾者十個木香二錢五分胡椒二錢巴豆用十九粒去殼皮心膜油上三味為末入巴豆霜和勻炊餅為丸如麻子大硃砂為衣每服五十丸隨症調飲冷下按此丸北人甚效南人斟酌用之小兒二丸按太平聖惠方載本方巴豆霜用十粒每服只五丸因此方甚烈故考正之枳實青皮湯六十治食熱物過傷太陰厥陰嘔吐膨脹下痢白朮一錢半枳實青皮陳皮黃連薑汁炒麥芽山楂肉神麯炒各一錢甘草三分酒大黃一錢七分上用水二鍾煎一淺鍾溫服此傷之輕者傷重用後方萬病遇仙丹六十一治濕熱內傷血分之重者黑牽牛一斤半生半炒取頭末五兩大黃酒浸曬乾三稜莪朮豬芽皂角去弦子茵陳枳殼去穰檳榔各四兩俱生木香一兩上為細末用大皂角打碎去子煎濃湯去渣煮麵糊為丸如緑豆大每服實而新起二錢虛而久者一錢白湯送下小兒各減半食積所傷本物煎湯下大便不通麻仁湯下小便不通燈心木通湯下隨病輕重加減調引加味小青龍湯六十二治春初寒邪傷肺咳嗽乾薑炒黑細辛麻黃桂枝甘草各五分白芍藥五味子各一錢半夏薑製一錢五分枳殼桔梗各五分白茯苓陳皮各八分上用薑三片水煎食少時稍熱服升麻葛根湯六十三治大人小兒時氣瘟疫發熱頭疼及瘡疹已發未發疑似之間並宜服之極穩升麻葛根白芍藥各一錢半甘草一錢上用薑三片蔥白三寸水一鍾半煎七分食遠服頭疼加川芎白芷各一錢身痛背強加羌活防風各一錢發熱不退春加柴胡黃芩各一錢五分防風一錢夏加黃芩一錢五分石膏二錢五分咽痛加玄參桔梗各一錢頭項面腫加防風荊芥連翹白芷各一錢半石膏三錢牛蒡子川芎各一錢小兒麻疹加防風連翹各一錢痘疹未發依本方已發屬熱加連翹紫草各一錢大人遍身癮疹加防風蒼朮各一錢半牛蒡子蒼耳子浮萍草各一錢防風通聖散六十四通治諸風濕熱瘡毒時行熱病防風川芎當歸白芍藥連翹薄荷各一錢荊芥穗白朮山梔各七分黃芩桔梗各一錢半石膏一錢滑石三錢甘草五分上用薑三片水二鍾煎一鍾食遠服此方內大黃芒硝麻黃對症漸加風熱內甚欲下加大黃三錢芒硝二錢風濕熱在表欲汗加麻黃二錢蔥白三根自利體寒去硝黃自汗去麻黃加桂枝春夏八分秋冬一錢常用依本方加味治中湯六十五治春月肝木乘脾腹痛久瀉不止人參一錢半白朮陳土炒二錢半白芍藥醋炒一錢五分甘草炙一錢青皮去穰麩炒七分陳皮去白一錢乾薑炒黑一錢蒼朮麩炒一錢半升麻五分柴胡五分防風五分白茯苓一錢久瀉虛寒加熟附一錢上用薑三片加大棗二枚水二鍾煎一鍾食前服人參敗毒散六十六治感冒非時傷寒頭疼身熱拘急憎寒壯熱及時行瘟疫熱毒人參一錢羌活一錢半獨活一錢柴胡一錢二分前胡一錢葛根一錢甘草五分桔梗枳殼茯苓各八分川芎蒼朮各一錢勞役得病倍用人參加白朮當歸白芍藥去獨活前胡飢饉兵亂之餘飲食不節起居不常致患時行瘟熱病沿門闔境傳染相似宜此方加白朮黃耆生倍人參去前胡獨活甚效若多服未效而有寒熱往來者必用小柴胡湯不拘服數並無過失又有一種蝦蟆瘟病使人痰涎風壅煩熱頭疼身痛嘔逆或飲食起居如常但咳聲不響續續相連儼如蛙鳴故俗號曰蝦蟆瘟也嘉靖己未五六七月間江南淮北在處患動數百里皆同甚至赤眼口瘡大小腮腫喉閉風壅噴嚏涕嗘稠黏並用此方去茯苓桔梗獨活加青皮陳皮白朮藿香但以荊芥為引不用生薑薄荷一二服即愈治時行熱病單方附前歌曰人間治疫有仙方一兩薑蠶二大黃薑汁為丸如彈大井花調服便清涼治瘟疫不相傳染方六十七赤小豆不拘多少以新布囊盛放井中浸二日取出舉家各服二十一粒不染試效凡入瘟疫之家以麻油調雄黃末塗鼻孔中或預飲雄黃燒酒一二杯然後入病家則不相傳染既出則以紙捻探鼻深入令噴嚏為佳神朮散六十八治閩廣山嵐瘴氣不伏水土等症厚朴一錢半蒼朮二錢半陳皮一錢半甘草一錢石菖蒲一錢藿香一錢半上用薑三片棗一枚煎服一方用香附一錢半代菖蒲名神朮散氣散尤妙紫金錠即萬病解毒丸六十九治山嵐瘴氣並嶺南兩廣蠱毒名從宦於此才覺意思不快即服一錠或吐或痢隨手便瘥又誤中一切毒物若牛馬六畜中毒亦以此藥解之山慈姑此味與老鴉蒜相似但蒜無毛而此上有毛包宜辨真去皮焙乾淨末二兩千金子一名續隨子去殼研去油二兩紅芽大戟一名紫大戟江南者佳形如甘草而堅不可用綿大戟焙乾淨末一兩半麝香三錢另研一方有雄黃五錢無亦效上為末以糯米打糊和勻搗千餘下一方印作四十錠每服半錠水磨服一切腫毒磨塗患處須擇冬至端陽七夕重陽日天月二德天醫日灑掃淨室焚香至誠修合無不靈驗發散傷寒單方七十凡遇傷寒倉卒無藥不問陰陽二症只用生薑一兩蔥白十莖好酒二大鐘煎一大鐘去渣熱服被蓋周身汗透即解勿令汗太過忌大葷五七日春秋依此本方夏月薑蔥減半冬月倍用若加黑豆二合炒同薑蔥煎服冬月尤妙發散傷風單方附前用紫蘇葉二錢半核桃五個打碎薑三片蔥白二根水二鍾煎一鍾熱服微汗即解夏月不用蔥按此二方極效出路荒僻無醫之處甚便夏月諸症治例內經曰夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病大抵夏三月天氣蕃育陽氣發越於外陰氣伏藏於內是故夏月諸症宜補陰養陽蓋脾胃喜溫而惡寒食忌瓜果水水藥禁純用寒涼先哲每於諸涼藥中必加炮薑正此意也蓋夏月心小腸火用事肺大腸金受傷孫真人制生脈散於夏月救天暑之傷庚金金清則水得以滋其化源其旨微矣東垣推廣其意制清暑益氣湯專以胃氣為本蓋土旺而金自榮不為火所制脾胃旺自能健運榮養百骸暑濕之邪自不能幹矣今將夏月合用諸方詳陳於左對症活用無執一也夏初春末頭疼腳軟食少體熱精神困憊名曰注夏病屬陰虛元氣不足宜用此方治之七十一黃耆人參各一錢白朮一錢半甘草炙五分陳皮當歸白芍藥黃柏各八分麥門冬一錢五味子九粒上用水一鍾半薑一片棗一枚煎服有痰加半夏生脈散七十二止渴生津救天暑之傷庚金夏至後宜常服之人參一錢半麥門冬二錢五味子一錢上用白水煎服益原散七十三治暑月身熱小便不利此藥性涼除胃脘積熱又淡能滲濕故利小便而散濕熱也桂府滑石六兩飛甘草一兩另研上各為末和勻每服三五錢新汲水調下夏月身熱汗出惡寒而渴者名曰中暍此方主之人參白虎湯七十四石膏四錢知母二錢粳米三錢人參一錢半甘草一錢上用水一鍾半煎服夏月發熱惡寒身重疼痛小便澀灑然毛聳手足逆冷小有勞身即熱口開前板齒燥脈弦細虛遲此表裡中暍也用補中益氣湯加香薷扁豆有熱加黃芩黃連方見春類黃連香薷飲七十五治傷暑腹痛自汗噁心或吐或瀉身熱香薷二錢厚朴白扁豆炒黃連各一錢甘草炙五分上用水二鍾煎一鍾放冷徐徐服挾痰加半夏南星各一錢若虛加人參黃耆各一錢清暑益氣湯七十六治長夏濕熱蒸人人感之則四肢困倦精神減少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或痢或渴不思飲食自汗體虛黃耆蒼朮麩炒升麻人參白朮各一錢神麯陳皮澤瀉麥門冬各五分甘草炙黃柏酒炒當歸各四分五味子十粒葛根二分青皮麩炒二分上用薑二片棗一枚水二鍾煎一鍾食遠服六和湯七十七治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食並婦人胎産嘔吐砂仁七分半夏一錢杏仁人參赤茯苓厚朴白扁豆藿香葉各八分白朮一錢木瓜蒼朮各五分甘草三分上用薑三片棗一枚水二鍾煎一鍾食遠服附霍亂吐瀉始因飲冷或冒寒或大飢或大怒或乘舟車馬傷動胃氣而致若心痛則先吐腹痛則先痢心腹齊痛吐痢並作名曰霍亂其症頭旋眼暈手足轉筋四肢逆冷用藥稍遲須臾不救若誤飲食立死治宜溫藥解散腹痛面青不渴為寒腹痛燥渴面赤為熱急無藥時熱用鹽打井花水多飲寒用吳茱萸木瓜食鹽各五錢同炒焦先煎水三碗令百沸入藥同煎至二碗隨飲藥入即蘇走後服前六和湯寒加乾薑熱加黃連各一錢附濕之一症有自外入者有自內得者陰雨濕地皆從外入宜汗散久則疏通滲泄之過食生冷濕面潼酪或飲酒其症腫滿皆自內而出也宜實中宮淡味滲泄利小便為最若濕腫腳氣亦當汗散加味胃苓半夏湯七十八治諸濕隨症加減用陳皮八分白朮半夏茯苓各一錢酒芩羌活各八分蒼朮一錢半甘草四分上用薑三片水煎服濕在上倍蒼朮濕在下加升麻八分內濕加豬苓澤瀉各一錢桂少許中焦濕與痛有實熱者加黃連木通各一錢肥白人因濕沉困怠惰是氣虛加人參黃耆各一錢倍白朮黑瘦人沉困怠惰是濕熱加白朮黃芩酒炒白芍藥各一錢山精丸七十九健脾去濕息火消痰養血方見滋補類附薏苡仁粥方見養老類附泄瀉有五不可例治瀉水腹不痛者濕也飲食入胃不停完穀不化者氣虛也腹痛水瀉腸鳴痛一陳瀉一陳火也或瀉或止或多或少者痰也腹痛甚而瀉瀉後痛減者食積也當隨症加減而分治之加味胃苓湯八十治諸瀉依後加減用陳皮炒一錢黃芩澤瀉各一錢白朮陳土炒一錢半白芍藥酒炒一錢半蒼朮米泔浸去皮切片日曬乾鹽水炒一錢半豬苓八分赤茯苓八分桂二分黃連薑汁炒八分半夏薑汁炒一錢二分甘草五分上用水二鍾薑三片燈心一分煎八分空心溫服泄瀉注下如水本方加蒼朮車前子倍加白朮為末空心米湯調下煎服亦可濕熱甚肛門如熱湯者本方去桂加滑石末二錢倍黃苓一錢山梔炒一錢木通八分腹中痛下泄清冷喜熱手蕩尉口不燥渴者乃寒瀉也三倍桂加肉豆蔻麵包煨一錢病甚者加丁香製附子各八分作丸服如久瀉穀道不合或脫肛此元氣下陷及大腸不行收令故也用白朮芍藥神麯俱炒陳皮不去白肉豆蔻煨訶子肉烏梅五倍子各等分為丸以四君子加防風升麻煎湯送下此法試效如食積時常腹痛瀉積先以木香檳榔丸或枳實導滯丸推逐之然後以四苓加厚朴蒼朮神麯麥芽作丸服以安胃氣二方見袖珍方內五苓去桂名四苓如瀉水腹不痛者屬氣虛四君子倍白朮加黃耆升麻柴胡防風補而提之泄瀉日夜無度諸藥不效者用針砂地龍豬苓各等分為末生蔥搗汁調方寸匕貼臍心小便長瀉即止大人小兒吐瀉日久垂死灸天樞二穴在臍兩傍各開二寸氣海一穴在臍下一寸半中脘穴在臍上四寸半加味香砂枳朮丸八十一治飲食所傷脾胃不和欲作瀉痢並七情所傷痞悶嘔吐不思飲食瀉痢後理脾胃去余滯此藥一運一動一補一消活法用之極有奇效白朮土炒二兩黑枳實麩炒一兩半夏曲真者一兩五錢陳皮去白一兩砂仁炒七錢半香附醋浸曬乾炒一兩麥芽面炒一兩木香不見火五錢黃連薑汁炒春五錢夏一兩神麯炒一兩有痰加竹瀝半碗薑汁二盞上為末薄荷煎湯打老米糊為丸如梧桐子大每服七八十丸食遠白湯送下參苓白朮丸八十二瀉痢後調理脾胃極穩纍效人參一兩五錢去蘆白朮土炒一兩白茯苓去皮兩半甘草炙一兩山藥薑汁炒一兩半砂仁炒一兩薏苡仁炒二兩桔梗去蘆炒一兩蓮肉去皮心一兩半若痢後虛弱用石連肉黃連用吳茱萸同浸半日連汁炒乾去萸一兩餘外脾胃虛弱調補只照本方上為末晚米糊一半蜜一半和為丸如梧桐子大每服七八十丸食遠白湯送下治老少脾泄久不愈神方附用冬米造飯鍋巴淨末四兩蓮肉去心淨末四兩享糖末四兩共和勻每服三五匙食遠白湯調下一日三次鄒太湖先生傳養脾進食丸八十三治瀉痢後脾胃虛弱飲食減少人參白朮土炒白茯苓各三兩甘草一兩半陳皮半夏曲厚朴薑汁炒各二兩蒼朮麩炒三兩砂仁炒一兩半神麯炒麥芽炒各二兩半木香五錢上為細末神麯麥芽面打糊為丸如梧桐子大每服五十丸食遠白湯送下瘧症春夏因飲食勞倦而得秋冬因傷暑而成然無痰不能作屬三陽宜汗宜吐屬三陰宜下宜溫宜分治之附柴苓平胃湯八十四治瘧初起熱多寒少宜此方分利柴胡一錢半黃芩蒼朮半夏各一錢甘草三分白朮一錢半白茯苓陳皮厚朴人參豬苓澤瀉各八分桂技五分清脾飲八十五服前方一二服不止再用此方白朮一錢半厚朴八分白茯苓半夏各一錢甘草四分柴胡一錢半黃芩一錢二分青皮草果檳榔各七分上用薑三片棗一枚水一鍾半煎八分空心服渣再並將發時服若大渴加知母麥門冬各一錢若不止加常山酒炒一錢半烏梅二個空心五更服即止如不止再用後方常山飲附截瘧神方常山燒酒炒二錢檳榔一錢草果一錢烏梅二個知母一錢貝母一錢半上用薑三片棗一枚水八分酒七分煎八分露一宿五更日未出時面東空心服渣用酒浸煎待將發時先服立效蓋人多畏常山為吐藥而不輕用殊不知瘧因痰作常山吐去其痰而瘧即止瘧止以後方調補加味補中益氣湯八十六瘧後調理脾胃並治餘熱即前補中益氣湯倍柴胡一錢加半夏黃芩白芍藥各八兩薑棗煎服方見春類露薑飲附治脾胃聚痰發為瘧寒多熱少用生薑四兩和皮帶水搗汁一碗夜露至曉空心冷服立止咒由科八十七治瘧法不問久新瘧疾一次即愈用桃杏棗梨隨用一樣單梨亦好咒曰吾從東南來路逢一池水水裡一條龍九頭十八尾問伊食甚的只食瘧疾鬼先念一遍吹果上念七遍吹果上七次令患人於發日五更雞犬不聞時面東而立將果食之於淨室中安臥忌食瓜果葷腥熱物此法十治可好八九按此法雖不合現代科學惟聞越城名醫何廉臣先生常用醫病足見古法必無不合附痢因熱積氣滯而成又夏月過傷生冷以致秋來發痢先賢謂行血則便膿自愈調氣則後重自除此要法也枳殼大黃湯八十八痢初一二日元氣未虛用此方下之枳殼一錢半檳榔一錢厚朴一錢大黃壯實五七錢虛人三四錢上用水一鍾半先煎三味至一鍾下大黃再煎二三沸熱服得快利為妙止痢極效方八十九既下之後即以此方止之當歸赤芍藥懷生地黃各七分黃連一錢甘草三分酸石榴皮八分粟殼蜜炒八分地榆八分上用水一鍾半煎七分食前服一服即止二妙香連丸九十治赤白痢立效木香一兩黃連四兩吳茱萸二兩同浸一夜炒乾去茱萸不用上二味為末粟米糊為丸如梧桐子大每服七十丸食遠白湯下初起宜推蕩本方加大黃二兩檳榔一兩以行之再以本方加肉豆蔻雞蛋清炒一兩五錢以止之此謂二妙也萬氏方治痢十法附凡下痢惡寒發熱身頭俱痛此謂表症宜微汗和解用蒼朮川芎陳皮芍藥甘草生薑三片煎其或腹痛後重小便短此為里症宜和中疏氣用炒枳殼製厚朴芍藥陳皮甘草滑石煎其或下墜異常積中有紫黑血而又痛甚此為死血症法當用擂細桃仁滑石行之或口渴及大便口燥辣是名挾熱加黃芩或口不渴身不熱喜熱手尉是名挾寒加薑桂其或下墜在血泄之後此氣滯症宜於前藥加檳榔一枚其或在下則纏住在上則嘔食此為毒積未化胃氣未平當認其寒則溫之熱則清之虛則用參朮補之毒解積下食自進其或力倦自覺氣少懶食此為挾虛症宜加白朮當歸身尾甚者加人參又十分重者止用此一條加陳皮補之虛回而痢自止其或氣行血和積少但虛坐努簀此為無血症倍用當歸身尾卻以生芍藥生地黃而以桃仁佐之復以陳皮和之血生自安其或纏墜退減十之七八穢積已盡糟粕未實當用炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸三十粒然固腸丸性燥恐尚有滯氣未盡行者但當單飲此湯固腸丸未宜遽用蓋固腸丸有去濕實腸之功其或痢後糟粕未實或食粥稍多或飢甚方食腹中作痛切不可驚恐當以白朮陳皮各半煎湯和之自安其或久痢後體虛氣弱滑下不止又當以藥澀之可用訶子肉豆蔻白礬半夏甚者添牡蠣可擇而用之然須以陳皮為佐恐大澀亦能作痛又甚者灸天樞氣海上前方用厚朴專瀉滯凝之氣然厚朴性大溫而散久服大能虛人滯氣稍行即去之余滯未盡則用炒枳殼陳皮然枳殼亦能耗氣比之厚朴稍緩比陳皮稍重滯氣稍退亦當去之只用陳皮以和衆藥然陳皮去白有補瀉之兼若為參朮之佐亦純作補藥用凡痢疾腹痛必以白芍藥甘草為君當歸白朮為佐惡寒痛者加桂惡熱痛者加黃芩達者更能參以歲氣時令用藥萬舉萬全豈在乎執方而已哉附火症有虛實輕重輕者可降重則從其性而折之實火宜瀉虛火宜補陰虛火動難治宜滋陰降火升陽散火湯九十一治男婦四肢發熱筋骨間熱表熱如火燎於肌膚捫之烙手此病多因血虛而得或脾胃過食冷物郁遏陽氣於脾土之中並治此火鬱則發之義也升麻五分葛根羌活獨活各七分白芍藥一錢人參去蘆黃耆生用各八分甘草四分半生半炙柴胡七分防風五分上用薑棗水煎溫服忌生冷寒物此虛火宜補宜散黃連解毒湯九十二治實火燥亂煩渴蓄熱內甚黃連黃芩黃柏梔子各等分上用水煎服加大黃名梔子金花丸亦治實熱火此實火宜瀉滋陰降火湯附治陰虛火動起於九泉此補陰之妙劑也當歸一錢川芎五分白芍藥薄荷汁炒黃芩七分生地黃薑汁炒黃柏蜜水炒知母酒炒各八分柴胡七分熟地黃八分麥門冬八分上用薑一片棗一枚水煎服別以附子為末唾津調貼湧泉穴氣虛加人參黃耆各八分咳嗽加阿膠杏仁各七分五味子三分咯唾衄血加牡丹皮八分藕節自然汁三匙犀角末五分此與前補陰散大同小異詳輕重參用玄明粉秋石皆降火甚速宜頻用之童便亦好方並見前痰症屬濕乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲故曰痰因火動降火為先火因氣逆順氣為要以加味二陳湯主之九十三橘紅去白一錢半夏制貝母各一錢半白茯苓去皮一錢甘草三分枳實炒一錢天花粉七分黃芩酒炒一錢白朮一錢二分防風去蘆連翹各五分香附童便炒一錢檳榔六分上用薑三片水二鍾煎一鍾食遠服半夏湯附消痞化痰甚捷半夏薑汁拌透曬乾陳皮鹽水微浸去白白茯苓各二錢桔梗去苗炒枳實炒各一錢上用薑三片水煎食遠服或丸亦可滾痰丸九十四治一切宿滯及風熱之痰大黃錦紋者八兩酒蒸九次黃芩酒浸連酒炒乾八兩沉香不見火五錢硃砂天葵草伏過一兩另研青礞石一兩半用焰硝一兩半用火煨如金色去硝上為細末麵糊為丸如緑豆大硃砂為衣每服五十丸食後白湯或茶下清心化痰丸附養心消痰降火極效南星一斤為末用臘月牛膽五個裝入膽內至春取出淨用十五兩半夏湯泡七次薑汁浸透曬乾十兩真玄明粉四兩用臘雪水制的石膏一斤用甘草四兩同煮一日去甘草曬乾十五兩白芷四兩米硃砂用天葵草伏三兩另研上為末薑汁糊丸如緑豆大砂朱為衣每服八九十丸食後白湯送下清肺化痰丸一名祛痰丸清痰降火甚速酒客尤宜九十五旋覆花去梗葉淨末一兩南星五錢薑製半夏五錢薑製上先以南星半夏二味水浸夏二日秋三日冬五日取出曬乾共為細末九月採半黃栝蔞六枚淡竹瀝一杯勻和三味共入石臼搗極爛為薄餅先用黃蒿鋪匣內二寸厚將餅安於蒿上仍用蒿覆地下咯薄三七日取出曬乾此栝蔞曲石臼搗為細末與後開藥合用白朮炒白茯苓去皮各一兩黃芩酒炒黃連薑汁炒香附童便浸炒甘草節半生半炙各五錢枳實麩炒五錢晉礬五倍各一錢陳皮鹽水浸一半去白一半不去白一兩上為末與前栝蔞面末和勻用淡生薑汁打糊為丸如梧桐子大每服四五十丸早晚各進一服白湯下上此方出醫家必用古今痰方見效捷者無右於此服久且能健脾胃試有奇驗痰火為害危極者擂爛從鼻灌之無不愈者眩暈之症因虛痰火炎上故也宜清陽除眩湯主之附旋覆花天麻各八分半夏制陳皮白朮白茯苓各一錢檳榔八分人參六分甘草四分上用薑三片水煎食遠服嘔吐翻胃皆屬胃虛氣逆膈上有痰亦有寒有熱宜大半夏湯隨寒熱加減主九十六陳皮去白一錢半茯苓去皮一錢半半夏薑汁製二錢半上用水煎臨服入生薑自然汁半盞和服屬熱加芩連各一錢半屬寒加生薑十片同煎服時仍入薑汁半盞屬胃虛加參術各一錢半服時亦要用薑汁附翻胃膈食之症屬氣虛右脈緩而無力者是宜人參白朮茯苓甘草炒屬血虛左脈數而無力滯澀者是撫芎七分白芍藥一錢半當歸一錢熟地黃錢半紅花三分氣血俱虛口中多出沫者是並用前八味屬痰脈多滑數寸關脈沉或伏而大者是宜陳皮去白一錢半半夏二錢薑製茯苓一錢半甘草五分屬熱六脈洪數有力者是宜黃芩黃連黃柏梔子各等分寒六脈沉微而遲者是宜人參白朮乾薑各一錢甘草減半加白豆蔻仁丁香沉香各七分並用童便韭汁牛羊乳竹瀝薑汁共半鍾入前藥半鍾和勻服一日服一次此法雖緩不犯狠燥若能清心寡欲內觀自養服久必獲奇效黃疸症專屬濕熱盒面相似宜茵陳五苓散主之九十七茵陳三錢白朮赤茯苓各一錢半豬苓一錢桂二分澤瀉一錢蒼朮山梔滑石各一錢二分甘草炙五分上用水煎入燈心一握食遠服祕傳棗礬丸附治黃胖纍有奇效附紅棗一斤去核雞肫皮四個焙乾為末皂礬一兩釅醋一碗上為末醋煮飛羅面為丸如緑豆大每服五十丸食遠酒下附夏月時氣瘟疫並傷寒傷風並宜十神湯隨兼症加減用川芎白芷麻黃紫蘇葉各七分乾葛一錢半升麻七分陳皮香附芍藥各八分上用薑三片蔥白五寸淡豆豉二錢半水一鍾半煎八分熱服無汗惡寒發熱依本方熱甚加黃芩一錢半石膏二錢有汗去麻黃蔥白附河間先生制雙解散即防風通聖散合益原散是專治夏月傷寒時行瘟熱等症隨所見症加減用之極為切當但大黃芒硝麻黃三味須對症漸加減自利去大黃芒硝自汗去麻黃蔥白防風通聖散方見春類益原散一名六一散方見本類前
