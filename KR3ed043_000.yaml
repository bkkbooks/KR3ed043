body:
  text: 醫便提綱補陰丸一丹溪謂人陽常有餘陰常不足宜常補其陰使陰與陽齊則水升火降人惟以腎氣為本故此方專滋補腎水枳實丸二內經以脾土旺能生萬物以胃氣之法地一補一消制其太過蒼朮丸三專治不足之氣血諸虛百損遍身痰凝氣滯風濕麻痹眼目昏花腰疼頭暈手足欠順遺泄便濁胎前産後赤白淋澀皆治補天大造丸四培養元氣延年益嗣壯陽光溫坎水降離火虛勞房室過度之人五心煩熱四十以後尤宜常服接補真元以躋上壽四物湯五治男婦血虛諸症婦人之總藥四君子湯六治男婦氣虛脾胃諸症八物湯七氣血虛用即前二方合用十全大補湯八治男婦諸虛五勞七傷生氣血補脾胃即前八物湯加黃耆一錢二分肉桂八分薑棗煎服補中益氣湯九治勞倦傷脾喜怒憂恐耗損元氣榮衛不調乃生寒熱皆脾之氣不足此方主之人參飲十人遇勞倦辛苦過多即服此方免生內傷發熱之病主於補氣當歸飲十一人遇勞心思慮損傷精神頭眩目昏心虛氣短驚悸煩熱補血為主補陰散十二即滋陰降火湯治陰虛火動盜汗發熱咳嗽吐血肌肉消瘦酒色過傷柴胡梅連散十三治骨蒸勞熱三服即除地仙散十四治人四十以上患癆怯且不必補即先退潮熱有接天梯之術六味地黃丸十五治腎虛損形體惟悴寢汗潮熱發熱五臟齊損瘦弱虛煩骨蒸痿弱下血亦治腎消瀉赤白濁俱效人參固本丸十六清心補水養血滋陰秋石四精丸十七治腎虛盜汗腰痛安神定志丸十八清心肺補脾腎安神定志消痰去熱勤政勞心讀書克苦奇效八寶丹十九平調氣血滋補五臟加味坎離丸二十能生津益血升水降火清心明目上盛下虛服之極效十精丸二十一補虛明目多用極效太極丸二十二藥有五味各主五臟可使調和故曰太極四靈丹二十三精力倍加胃氣強健飲食日增壽故彌長滋腎丸二十四平補氣血滋陰降火少年血氣素弱女人亦宜大補陰丸二十五溫補下元滋陰降火酒色人年五十以上服之極效加味瓊玉膏二十六補血益損清金水以滋化源老少虛損極效山精丸二十七健脾除濕去火消痰還元丹二十八養脾補腎老人尤宜常服脾泄腎泄俱效玉柱杖二十九填精益腎烏須黑髮延年益壽方士以為服食二至丸三十清上補下第一方價廉而功大常服奇效天門冬膏三十一滋陰降火清肺補腎充旺元陽久服延年耳目聰明如童子十珍膏三十二補養血氣調理脾胃清肺滋腎大病後調補要藥何首烏丸三十三補益腎肝聰耳明目卻病延年第一藥也經驗何首烏丸三十四老人衰弱血氣不足遺尿失禁鬚髮斑白濕熱相駁腰背疼痛齒酸腳飲行步艱難眼目昏花久服應效不述四制黃柏丸三十五此藥與前方兼服長春丹三十六補益腎肝聰耳明目卻病延年神仙長春廣嗣丹三十七治五癆七傷形顏衰朽中年陽事不舉精神短少鬚髮先白左癱右瘓婦人下元虛冷久不孕育纍經奇驗延齡育子丸三十八少年斫喪終年無子女人不育夫婦齊服一料即孕經驗信非虛言祕傳六神丸三十九固真育子纍有奇效龜鹿二仙膏四十專治男婦虛損久不孕育或多女少男服此百日即孕生男應驗秋石乳酥丸四十一補養血氣接續真元降陰火生腎水此以真補真之妙藥小接命丹四十二男婦氣血衰弱痰火上升虛損困憊癱瘓中風身體疼痛行履不便極效長春真人保命服食四十三諸虛百損五癆七傷手足頑麻面黃虛耗陽事不舉頭眩噁心飲食少減補諸虛添精髓返老還童黑髮生齒大有神效補血順氣藥酒方四十四清肺滋腎和五臟通血脈許真人驗椒丹四十五五癆七傷諸虛百損並治諸蟲積暖下元八仙早朝糕四十六補脾胃虛弱膨悶泄瀉不思飲食服之神效養元辟穀丹四十七安五臟消百病和脾胃補虛損固元氣實精髓能令瘦者肥老者健常服極效辟穀休糧方四十八此方亦平和有理但未經試芎芷藿蘇散四十九春初人事勞擾飢飽失時或解衣觸冒致成內傷外感頭疼發熱嘔吐膈脹鼻涕咳嗽生痰聲重一二服即愈忌葷腥三五日芎蘇香葛飲五十春月感冒傷寒山嵐瘴毒人感觸之頭疼身痛惡寒發熱人迎脈浮者大是九味羌活湯五十一解利春夏秋傷寒熱病極穩六神通解散五十二春末夏初傷寒時行熱病表發甚捷凡瘟疫初起預用藿香正氣散煎一大鍋每人服一碗已病用九味羌活湯並服芎芷香蘇散五十三春月傷風鼻塞聲重清涕咳嗽痰壅氣逆脈浮緩者是加減藿香正氣散五十四治非時傷寒頭疼憎寒壯熱痞悶嘔吐時行疫癘山嵐瘴瘧不服水土等症加減補中益氣湯五十五治飲食勞力讀書勤政傷神飢飽失時瘧狀發熱惡寒頭疼身痛勞極復感風寒則頭痛如破是外感傷寒之症不可發表以致傷人附子理中湯五十六治房勞內傷寒邪中陰面青腹痛六脈沉微無頭疼大熱宜用陽症不用生薑五苓湯五十七治大飲冷水傷脾過飲酒而傷氣半夏神麯湯五十八治過食寒冷硬物瓜果致傷太陰厥陰嘔吐痞悶腹痛惡食此治傷之輕者神保丸五十九消一切生冷積滯此治傷之重者枳實清皮丸六十治食熱物過傷太陰厥陰嘔吐膨脹下痢萬病遇仙丹六十一治濕熱內傷血分之重者加味小青龍湯六十二治春初寒邪傷肺咳嗽升麻葛根湯六十三治大人小兒時氣瘟疫發熱頭疼及瘡疹已發未發疑似之間並宜服之極穩防風通聖散六十四通治諸風濕熱瘡毒時行熱病加味治中湯六十五治春月肝木乘脾腹痛久瀉不止人參敗毒散六十六治感冒非時傷寒頭痛身熱拘急憎寒壯熱及時行瘟疫熱毒附單方瘟疫不相傳染二方六十七神木散六十八治閩廣山嵐瘴氣不伏水土等症紫金錠六十九治山嵐瘴氣並嶺南兩廣蠱毒若從宦於此才覺意思不快即服一錠或吐或痢隨手便瘥又誤中一切毒物若牛馬六畜中毒亦以此藥解之發散傷寒單方七十七附發散傷風單方注夏病七十一夏初春末頭疼腳軟食少體熱精神困憊名曰注夏病屬陰虛元氣不足此方治之生脈散七十二止渴生津救天暑之傷庚金夏至後宜常服之益原散七十三治暑月身熱小便不利附身熱汗出惡寒而渴者名曰中暍此方主之一名六一散人參白虎湯七十四夏月發熱惡寒身重頭痛小便澀毛聳手足冷前板牙燥表裡中暍也黃連香薷飲七十五治傷暑腹痛自汗噁心或吐或瀉身熱清暑益氣湯七十六治長夏濕熱蒸人人感之則四肢困倦精神減少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或痢或渴不思飲食自汗體虛六和湯七十七治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀或痢疾中酒煩渴並婦人胎産嘔吐立效附霍亂吐瀉論附濕症加味胃苓半夏湯七十八治諸濕隨症加減山精丸七十九治健脾去濕息火消痰養血方見滋補類附薏苡仁粥方見養老類附泄瀉五症加味胃苓湯八十治諸瀉痢加味香炒枳朮丸八十一治飲食所傷脾胃不和欲作瀉痢並七情所傷痞悶嘔血不思飲食瀉痢後理脾胃去余滯此藥一運一動一補一消極有奇效參苓白朮丸八十二治瀉痢後調理脾胃極效附老少脾泄久不愈方養脾進食丸八十三治瀉痢後脾胃虛弱飲食減少附瘧症論柴苓平胃湯八十四治瘧初起熱多寒少宜此方分利清脾飲八十五服前方一二服不止即服此方附常山飲截瘧神方加味補中益氣湯八十六瘧後調理脾胃餘熱附露薑飲脾胃聚痰發為瘧咒山方八十七治瘧不問新久一次即愈枳殼大黃湯八十八痢初一二日元氣未虛用此方下之附痢論止痢極效方八十九痢既下之後即以此方止之二妙香連丸九十治赤白痢立效附萬氏治痢十法附火症升陽散火湯九十一治男婦四肢發熱筋骨間熱表熱如火燎於肌膚捫之烙手此病多因血虛而得或過食冷物郁遏陽氣於脾土之中並治此火鬱發之義也附火症論黃連解毒湯九十二實火燥亂煩渴蓄熱內甚附滋陰降火湯陰虛火動起於九泉此補陰妙劑加味二陳湯九十三痰症論附半夏湯消痞化痰甚捷滾痰丸九十四治一切宿滯及風熱之痰附清心化痰丸養心消痰降火極效清肺化痰丸九十五清痰降火酒客尤宜附眩運症清陽除眩湯嘔吐翻胃九十六大半夏湯加減附翻胃膈食茵陳五苓散九十七治黃疸症附棗礬丸治黃胖附夏月時氣瘟疫並傷寒傷風並宜十神湯附河間先生論參蘇飲九十八治秋月傷寒發熱頭疼咳嗽或中脘痞滿嘔吐痰水寬中快膈不致傷脾感冒風邪鼻塞憎寒壯熱名曰重傷風服之極效附秋諸症論十六味木香流氣飲九十九治男婦五臟不和三焦氣壅心胸痞悶咽塞不通腹脅脹滿嘔吐不食上氣喘急咳嗽痰盛面目浮四肢腫小便祕大便結憂思太過陰陽之氣鬱結不散壅滯成痰腳氣腫痛並氣攻肩背脅肋走注疼痛並宜服之五磨飲子一百治七情鬱結等氣或脹痛或走注攻痛開鬱湯一百一惱怒思慮氣滯而鬱一服即效鐵甕先生交感丹一百二貧富貴賤終身不得意婦人七情鬱結並治加味越鞠丸一百三常服調脾開鬱思食加味犀角地黃丸一百四治吐血嘔血衄血蓋諸失血乃火載血上錯經妄行其脈必芤此方主之身熱脈大難治血症復下惡痢易愈附潮熱論又二方玄霜膏一百五治吐血虛嗽生地黃飲一百六治下焦痛為血淋不痛為溺淋附小兒溺血清心蓮子飲一百七治遺精夢泄赤白濁金櫻煎丸一百八治夢遺精滑小便後遺瀝或赤白濁歸脾湯一百九思慮過度損傷心血健忘怔忡不寐此藥解鬱結養心健脾生血黃耆白朮湯一百十治陽虛自汗當歸六黃湯一百十一盜汗陰虛附耳鳴肺火盛腎氣虛通靈丸一百十二治耳聾附耳疳出膿四物三黃湯一百十三治目赤暴發雲翳赤腫痛不可忍石膏羌活散一百十四久患眼目不睹光明遠近內外氣瘴風熱上攻昏暗加味羊肝丸一百十五治一切目疾翳膜內外瘴育神夜光丸一百十六明目去翳瘴附洗眼二方清胃散一百十七胃熱牙根腫牽引頭腦俱痛或面發熱並效附風蟲牙疼痛不止白蒺藜散一百十八治牙疼根腫動搖常擦固齒附烏須固齒方治陰虛氣鬱牙出鮮血一百十九附舌上出血附小兒走馬牙疳既濟丹一百二十治口舌瘡附小兒口瘡不下乳附蒼耳丸治鼻流涕不止名曰鼻淵治血熱入肺名曰酒渣鼻一百二十一附喉痹十八症附青龍膽治咽喉閉塞單雙蛾牛蒡子散一百二十二治風熱上攻咽喉閉塞或成癰瘡潰爛烏須羊肝丸一百二十三不獨烏須亦能明目附染須方冬月諸症治例中風口禁先用通關散後用此方通關散一百二十四治中風吹鼻愈風散一百二十五治半身不遂手足欠利語言費力口眼歪頭眩目昏痰火骨痛頭痛心悸烏藥順氣散一百二十六治男婦風氣攻注四肢骨節疼痛手足癱瘓語言澀筋攣腳氣腰軟婦人血氣老人冷氣胸膈脹滿心腹刺痛吐瀉腸鳴等症稀蘞丸一百二十七治肝腎風氣四肢無力筋骨疼腰膝痿弱二十五般風眼此丸不可盡述搜風順氣丸一百二十八治三十六風七十二氣上熱下冷腰腳疼四肢軟黃瘦下痿氣塊老人尤宜五積散一百二十九治冬月傷寒婦人經候不調並宜服加減消風百解散一百三十冬月傷感風寒頭疼身體痛四肢倦痰壅喘嗽唾稠自汗惡風並治清肺子飲一百三十一論咳嗽附喘嗽二方附小青龍湯治寒嗽瓦壟子丸一百三十二治血塊附蜀葵膏治血塊通玄二八丹一百三十三治腹內飲食宿滯積聚止瀉痢之妙藥附追蟲痞結痞積三方烏藥丸一百三十四治酒積食積化痰水腫單腹脹蠱脹氣虛中方一百三十五調中健脾丸一百三十六治單腹脹脾虛腫滿膈中閉塞胃脘作疼附煅瓜蔞法附治心腹痛煎方仙方沉麝丸一百三十七治心腹痛氣不可忍青娥丸一百三十八治腎虛腰膝足痛滋腎益陰壯陽久服奇效當歸活血湯一百三十九治寒濕氣血凝滯腰痛附頭疼方治腳氣一百四十附諸疝海上方偏墜小腸氣三方腸風臟毒痔漏祕方一百四十一加味臟連丸一百四十二附膽槐丹治一切痔漏附脫肛真人活命飲一百四十三治一切癰疽腫毒附二黃散神仙蠟礬丸治腫毒神仙太乙膏一百四十四附彭幸槐子方忍冬花酒炙法三方夏枯草湯俱治腫毒三奇湯一百四十五治楊梅瘡疳瘡便毒附楊梅瘡祕二方附疳瘡搽藥二方五虎湯一百四十六治魚口一名便毒附治癬妙方風癬膿疒公𧘇疥瘡一應諸瘡毒方一百四十七附大楓膏搽膿窠疥瘡濕瘡臁瘡膏一百四十八附臁瘡二方附腳指縫爛手足凍瘡二方熱瘡遍身發出膿血赤爛或火丹如火燒一百四十九附火丹湯火泡二方四塊鵝掌風一百五十附腳墊毒腳走長路被石塊腳底墊腫不能行步拍蟹毒一百五十一附身上虛癢四物湯加減方一百五十二附烏骨丸治經候不調胎前産後諸症調經育子濟陰返魂丹一百五十三胎前後總藥一名益母丸附熬益母膏法蒸臍法一百五十四治婦人經水不通或癥瘕血塊臍腹作痛紅花當歸丸一百五十五治婦人血臟虛損經候斷續不調積瘀成塊腰腹刺痛肢體瘦弱濟陰百補丸一百五十六治婦人勞傷氣血不足陰陽不和作寒熱心腹痛胎前後並用赤白帶神方一百五十七附固真湯治赤白帶下臍下甚痛二服即效涼血地黃湯一百五十八治婦人血崩明是血熱妄行豈可作寒論治宜徐徐調理六合散一百五十九血崩不止諸藥不效此方立止保胎丸一百六十專治纍經墮胎久不育者宜服過七月則安矣安胎飲一百六十一治胎動胎漏不安一服立效加味六君子湯一百六十二妊娠時作嘔吐名惡阻宜此方芎蘇散一百六十三妊娠傷寒頭疼身痛發熱胸膈煩悶兀兀欲吐禁汗吐下止宜和解方見春類附妊娠傷寒護胎法十聖散一百六十四小産一症多因婦人氣血不足三合濟生丸一百六十五治臨産艱難雖一日不下服此自然轉動下生催生不傳遇仙丹一百六十六治難産附胎衣不下神方又方橫生逆産方一百六十七又方用針附血暈昏迷欲死清魂散一百六十八治産後眩運血暈二症附産後調補血氣産後敗血不止一百六十九治小腹繞臍作痛名兒枕附烏金散治産後一十八症大黃膏一百七十治症照後調下産後諸症抑肝散一百七十一寡居發寒熱類瘧久成瘵疾附生下小兒不能發聲謂之夢生又方急驚神方一百七十二附慢驚三方祕傳牛黃清心丸一百七十三治小兒驚風大人中風中痰中氣一切風痰之症回生錠一百七十四慢驚聖藥一錠即有起死回生之功頃刻見效故名回生急驚亦可祕傳黑神丸一百七十五治急驚風垂死者一服可活附治慢急驚風中風二方千金肥兒丸一百七十六治小兒疳症肚大筋青潮熱咳嗽胸前骨露調脾胃養血氣消積殺蟲散疳熱消疳餅一百七十七治諸疳積纍試極驗兒又肯吃附小兒吐瀉論加減錢氏白朮散一百七十八治吐瀉極效香橘餅一百七十九治小兒疳積下痢久瀉不止冷熱不調赤白相雜小腹疼痛禁口不食裡急後重日夜無度經久不瘥致脾虛脫肛不收並治白朮助胃丹一百八十治小兒吐瀉大能和脾胃進飲食化滯磨積治小兒傷食乳宜服此方消導之一百八十一附後方調補脾胃止瀉磨積錠一百八十二治小兒一切積滯惺惺散一百八十三變蒸一症乃小兒蒸皮長骨變幻精神不須服藥其有兼傷風寒咳嗽痰涎鼻塞聲重蒸蒸發熱宜服此藥附麻症斑疹論消毒飲一百八十四治斑疹熱甚紫黑者或痘未出時亦宜服附順逆險三法論附保元湯加味保元湯一百八十五附牛蒡子散神功消毒保嬰丸一百八十六治小兒未出痘時每遇春分秋分日進一丸其痘毒即漸消化只服一二次者只得減半三年六次其毒盡化必保無虞屢驗小兒初生一百八十七附撮口附小兒初生大小便不通大一丸一百八十八治小兒百病隨症調引卻病延壽丹一百八十九年高人便覺小水短少即是病進宜服此方三子養親湯一百九十老人苦於痰喘咳嗽氣急胸滿難食不可妄投蕩滌峻利之藥反耗真氣加味地黃丸一百九十一老人陰虛筋骨痿弱無力面造黯慘食少痰多嗽喘溺短澀陽痿足膝無力瘦弱腎氣久虛憔悴寢汗發熱作渴加味搜風順氣丸一百九十二老年常服潤利臟腑永無癱瘓痰火之病方見冬類固本酒一百九十三附菖蒲酒菊花酒冬青子酒紫蘇子酒四方豬腰子粥一百九十四附黃雞粥羊肉羊髓粥芡實蓮肉粥薏苡仁粥法制豬肚一百九十五附牛髓膏開胃炒麵糯米粉萬靈膏一百九十六附加味解肌湯附老太加味紫蘇飲柴胡三稜飲一百九十七治小兒食積黃連磨積丸一百九十八治一切痰飲痰積積聚拂鬱脅下悶飲食不消吐逆眩暈蘇合丸一百九十九附抱龍丸附牛黃丸活絡丹梁木灣方經驗肥兒丸二百附蟾酥五疳丸附金不換三七經驗方牙床腫痛二百一因食辛熱之物致以下床腫痛屬手陽明之藥擦牙散二百二附痢症痢方肚疼後重紅白痢相兼三方白痢久胃弱氣虛或下後未愈減者用二百三附紅痢久胃弱氣虛或下後未愈減者用附血痢附赤黑相兼小便赤澀痢久後重大腸墜下嘔吐食不下金華散二百四專治紅白痢久不愈者神效附瘧二方附松梅丸加味滋陰大補丸二百五主養血氣滋腎固陽潤體育神久服延年參朮啓脾丸二百六補脾益神壯元化痰靈飲食久服肥健延年固齒烏須補腎兼治牙疼二百七附治牙疼煎藥方羊肝餅二百八治小兒驚積左脅下有塊女人血瘕發熱瘦弱若積塊在右為食積宜貼阿魏膏不宜吃此餅治天泡瘡二百九治眼方二百十附洗點眼方又洗眼方法制陳皮二百十一附又方消毒方二百十二附敷腫毒治寒濕等瘡二百十三滸堂跌閃損折藥方二百十四附又方下瘀血附跌損方清金益壽丹二百十五雞酥餅二百十六清上焦潤咽膈生津液化痰降火止嗽醒酒毒治産後心風二百十七附産後惡露不通幾死者附産後尿胞落治痢二百十八附久痢不愈附又方血痢治遍身瘋痛二百十九附遍身走瘋治痘毒二百二十治痞積二百二十一治便毒二百二十二附便毒不收口治瘧症二百二十三治小便不通諸藥不效二百二十四治牛中暑二百二十五史國公百病無憂藥酒二百二十六
