front:
  text: 序道術亂而世法歧操術皮而人心惑歧故多病惑則迷方世之貿貿於對症也夫豈期夕故吾夫子教人拔去病根而一言蔽之曰能近取譬可謂仁之方也已然則堯舜之猶病與支離之神全其要渺政可想見如必待盧華越人而後已病則世所寄命之道蓋寡矣嗚呼此余有感於醫便之所由作也按是編為王侍御公按秦時所輯久之以參知劉公分守吳興益廣其傳余先公得而寶之為補其提綱以資省覽蓋故直指陳岷麓公令清溪時所遺也先公故喜談醫又時時軫余善病每計偕必授與俱行乃余出入宦邸嘗比於孝經大小學無須臾敢去案頭而江表之役尤十七在呻吟間反而取諸橐中罔不應手即不乏習盧華越人而精其傳者大都匪是則無以佐其不逮蓋近取若斯之效也惟是紙故墨諭而俯仰往今其人又俱為異物懼其久而失傳故乘息肩稍暇事復新之非敢必世之不惑不歧姑以行吾所信有如此者巡按直隸監察御史姚江念之道人徐應登題
