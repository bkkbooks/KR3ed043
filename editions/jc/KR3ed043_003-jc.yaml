body:
  text: 卷三秋月諸症治例附內經曰秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少大抵秋三月天氣清肅下降人氣亦下降故秋月諸症宜下謂下泄也分利謂利小便宜清和解不宜升散秋月肺大腸金氣用事金旺則木受制故有諸郁諸氣諸痛諸瘡諸積等症治法當隨症輕重加減治之故秋月宜培脾土以生肺金滋腎水以養肝木養血以潤燥損其有餘益其不足此大法也今將秋月諸症宜用之方詳陳於下隨症活法用之毋蹈實實虛虛之弊參蘇飲九十八治秋月傷寒發熱頭疼咳嗽或中脘痞滿嘔吐痰水寬中快膈不致傷脾及感冒風邪頭疼鼻塞憎寒壯熱名曰重傷風服之極效人參八分紫蘇葉前胡半夏葛根各一錢茯苓桔梗枳殼陳皮各八分甘草四分羌活蒼朮上用水一鍾半姜三片蔥頭一根煎八分熱服咳嗽加五味子五分杏仁七分久嗽有肺火去人參加桑白皮杏仁各八分鼻衄加麥門冬山梔仁炒黑烏梅茅根各一錢嘔逆加砂仁五分脾泄加白朮黃耆白扁豆蓮肉各一錢氣症有九其治則一惟順與降最為要法須兼郁治宜用十六味木香流氣飲主之此方治男婦五臟不和三焦氣壅心胸痞悶咽塞不通腹脅脹滿嘔吐之食上氣喘急咳嗽痰盛面目浮四肢腫小便秘大便結憂思太過陰陽之氣鬱結不散壅滯成痰腳氣腫痛並氣攻肩背脅肋走注痛並宜服之九十九紫蘇葉當歸川芎青皮烏藥桔梗白芍藥茯苓半夏黃耆枳實各八分防風五分甘草三分木香五分陳皮檳榔各六分上用水二鍾姜三片棗一枚煎一鍾不拘時溫服五磨飲子一百治七情鬱結等氣或脹痛或走注攻衛木香烏角沉香檳榔枳實臺烏藥上各等分以白酒磨服開鬱湯百一治惱怒思慮氣滯而鬱一服即效香附童便浸炒貝母各一錢半蒼朮撫芎神麯炒山梔炒陳皮去白茯苓枳殼去穰麩炒蘇梗各一錢甘草三分上用姜一片水二鍾煎一鍾食遠服有痰加半夏南星各一錢有熱加黃芩黃連各八分柴胡一錢血鬱加桃仁紅花各八分濕加白朮羌活各一錢氣加木香五分檳榔八分食積加山楂神麯各一錢砂仁七分鐵甕先生交感丹百二治先富後貧先貴後賤或終身不得志抑怏不得快及婦人七情鬱結師尼寡婦抑鬱不開並效香附童便浸高一指待七日洗淨曬乾搗碎醋炒一斤白茯神去皮心四兩人乳浸日曬夜露七日夜上二味為末煉蜜七分神麯三分打糊和為丸如彈子大每服一丸不拘時滾白湯化下加味越鞠丸百三常服調脾開鬱思食香附童便浸曬乾炒四兩蒼朮米泔浸去皮麩炒四兩撫芎四兩山梔四兩薑汁炒神麯炒四兩陳皮去白二兩白朮炒一兩山楂去子淨肉二兩黃芩酒炒一兩半上為末水丸如梧桐子大每服六十丸食後白湯下潮熱之症有陰陽之分平旦潮熱自寅至申行陽二十五度諸陽用事熱在行陽之分肺氣主之宜白虎湯瀉肺中之火日晡潮熱自申至寅行陰二十五度諸陰用事熱在行陰之分腎氣主之故用地骨皮以瀉血中之火蓋地骨皮瀉腎火總治熱在外牡丹皮治心包絡之火無汗而骨蒸又能瀉陰中伏火四物湯內加此二味治陰分潮熱極效婦人骨蒸潮熱以逍遙散加此二味累用尤妙若氣虛潮熱用黃耆三錢人參甘草各一錢五分甚者加熟附五分二三服即效蓋甘溫能除大熱也若血虛發熱用四物湯加柴胡防風地骨皮極效附加味犀角地黃湯百四治吐血嘔血衄血蓋諸失血乃火載血上錯經妄行其脈必芤此方主之身熱脈大者難治血症復下惡痢者易愈犀角鎊生地黃芍藥牡丹皮麥門冬黑山梔仁炒黑韭菜根自然汁吃透各等分上每服五錢水一鍾半煎七分溫服一方治吐血不止用乾薑炒黑臘月裝入牛膽內至春取出為末每用方寸匕童便調下立效此從治也一方治諸失血用壯血餘燒灰存性每服二錢米飲調下立止衄者以少許吹入鼻中妙玄霜膏百五治吐血虛嗽神效烏梅煎濃汁四兩薑汁一兩蘿蔔汁四兩梨汁四兩柿霜四兩款冬花紫苑各二兩俱為末以上藥制下聽用另用白茯苓十兩取淨末半斤用人乳三斤將茯苓末浸入取出曬乾又浸又曬乳盡為度卻將前冬花紫苑末柿霜白糖並各汁再加蜜糖四兩和勻入砂鍋內漫火煎熬成膏丸如彈子大每服一丸臨臥時噙化薄荷湯嗽口半月即效而愈溺血屬熱盛下焦痛者為血淋不痛者為溺血生地黃飲主之百六生地黃四錢小薊滑石通草蒲黃炒淡竹葉藕節當歸山梔甘草梢各等分上用水煎空心服並治血淋小兒溺血附用甘草升麻煎湯調益原散空心服立效清心蓮子飲百七治遺精夢泄赤白濁黃連生地黃酒洗麥門冬當歸酒洗各一錢甘草半生半炙五分茯苓一錢二分遠志七分酸棗仁八分石蓮肉一錢二分人參八分初起不用上用水煎空心服金櫻煎丸百八治夢遺精滑及小便後遺瀝或赤白濁芡實粉四兩白蓮花須未開者佳二兩白茯苓二兩去皮心龍骨煅五錢秋石真者一兩上藥為末聽用外採經霜後金櫻子不拘多少去子並刺石臼內搗爛入砂鍋內用水煎不得斷火煎約水耗半取出澄濾過仍煎似稀湯和藥末為丸如梧桐子大每服七八十丸空心鹽酒下餘膏每用一匙空心熱酒調服其功不可具述歸脾湯百九治思慮過度損傷心血健忘怔忡不寐此藥解鬱結養心健脾生血白朮白茯苓黃耆當歸各一錢木香三分圓眼肉三枚人參八分甘草炙三分酸棗仁炒研一錢二分上用姜一片棗一枚水煎食遠服自汗陽虛宜黃耆白朮湯主之百十黃耆一錢人參一錢白朮麩炒一錢一分甘草炙五分當歸八分上用浮小麥一撮水一鍾半煎七分食遠服忌五辛熱物盜汗陰虛宜當歸六黃湯主之乃治盜汗之聖藥也百十一當歸生地黃熟地黃各一錢黃連炒黃柏炒黃芩炒各八分黃耆一錢半牡蠣煅五分上用水二鍾煎一鍾臨臥通口服附耳鳴肺火盛腎氣虛宜四物湯四錢黃柏三錢童便煎空心服通靈丸百十二治耳聾松香五錢巴豆二十粒為末上將松香溶化入巴豆末和勻蔥汁為丸如棗核大綿裹塞耳左聾塞右右聾塞左兩耳聾次第塞之治耳疳出膿附白枯礬五錢麝香五釐胭脂胚三分半陳皮灰五分上為末先用綿枝子纏去膿另用綿裹藥作丸塞耳內四物三黃湯百十三治目赤暴發雲翳赤腫痛不可忍當歸川芎芍藥生地黃各一錢羌活防風黃芩龍膽草甘菊花黃連各八分玄參薄荷各五分上用水一鍾半煎八分食後通口服石膏羌活散百十四治久患兩目不見光明遠年近日內外氣瘴風熱上攻昏暗拳毛倒捷一切眼疾並宜服之羌活治腦熱頭風蜜蒙花治羞明怕日木賊退翳障白芷清利頭目麻子起拳毛細辛起倒捷川芎治頭風蒼朮行氣開鬱石膏去胃熱甘菊花明目去風黃芩退肺火荊芥治目中生瘡藁本治偏正頭風甘草和諸藥各等分上為末每服一錢至二錢食後臨臥用蜜水一盞調下或清茶亦可日進三服十日漸明二十日大驗此方治數十人俱效後人加當歸枸杞子梔子仁連翹柴胡薄荷防風桔梗天麻各等分為小丸服亦效加味羊肝丸百十五治一切目疾翳膜內外障白乳羊肝一具以竹刀割開去膜蒸熟搗如泥甘菊花五錢黃連一兩防風去蘆薄荷去梗荊芥穗去梗淨羌活當歸生地黃各五錢川芎三錢上為末羊肝泥和為丸如丸不就加少酒糊丸如梧桐子大每服六七十丸食後漿水下臨臥茶清下減半育神夜光丸百十六明目去翳障神效當歸酒浸洗全用烘乾遠志以甘草水煮去心牛膝去蘆酒洗懷慶者佳甘菊花去梗葉地骨皮去木洗淨甘州枸杞子去梗菟絲子酒洗去土再以酒浸經宿煮爛搗成餅曬乾聽用懷生地黃酒洗懷熟地黃酒洗煮爛二味同入石臼內搗如泥上除地黃外共為末以地黃膏和勻煉蜜為丸如梧桐子大每服六十丸空心鹽湯食後溫酒臨睡茶清送下洗眼方附當歸黃芩黃連各一錢銅綠皮硝白礬各七分上藥以絹袋盛煎湯洗目極明去熱又方附用王瓜去穰以皮硝裝入醃一宿待其硝點目極明清胃散百十七治胃經風熱牙齒或牙根腫痛或牽引頭腦俱痛或面上發熱並治此方累用極效當歸身酒浸黃連生地黃溫酒洗各一錢升麻二錢石膏二錢牡丹皮去木一錢五分上用水煎食後少時服治風蟲牙疼痛不止附芫花小麥細辛川椒蜂房食鹽各一錢上用水煎漱之勿咽極效白蒺藜散百十八治牙疼齦腫動搖常擦固齒用白蒺藜不拘多少去刺為粗末每服五錢淡漿水半碗煎七八分去渣入炒鹽末一撮帶熱時時漱之別無所忌然雖藥味不眾蓋單方之藥取效甚速神仙秘旨云若人服蒺藜一年以後冬不寒夏不熱服之二年老者復少發白復黑齒落更生服之三年長生輕身今雖不作湯散服餌久而漱之其效亦同烏須固齒方附七月取旱蓮草連根一斤用無灰酒洗淨用青鹽四兩醃三宿取出無油鍋內炒存性時將原汁漸傾入炒乾為末每日清晨用一錢刷牙連涎嚥下此二方簡而效大治陰虛氣鬱牙出鮮血方百十九川芎當歸白芍藥生地黃生甘草減半牛膝側柏葉香附各等分上用水一鍾半煎八分食稍遠服治舌上無故血出如線不止用槐花炒為末摻之附治小兒走馬牙疳一時腐爛即死此方極效神速用婦人溺桶中白垢火煅一錢銅綠三分麝香一分半各研和勻敷上立愈既濟丹百二十治口舌瘡神效用黃連乾薑等分為末搽上流涎即愈附治小兒口瘡不下乳食以白礬湯於腳上浸半日頓寬試效再以黃柏蜜炙殭蠶炒等分為末敷瘡上立下乳而安蒼耳丸附治鼻流濁涕不止名曰濁淵辛夷去梗五錢蒼耳子一錢半白芷一兩薄荷葉五錢上為末水丸彈子大每丸一錢每服二丸食後蔥茶湯下治血熱入肺名曰酒渣鼻此丸主之百二十一用苦參淨末四兩當歸淨末二兩和勻酒糊丸如梧桐子大每服七八十丸食後熱茶下一方盡立效喉痹十八症皆屬熱重者宜吐宜刺出血又針少商照海二穴極效宜服冰梅丸此方治喉痹十八腫俱效附大南星鮮者二十五個切片大半夏鮮者五十個切片白礬四兩皂角四兩去核子淨防風四兩鹽四兩桔梗二兩朴硝四兩揀七分熟梅子大者一百個先將硝鹽水浸一周時然後將各藥碾碎入水拌勻卻將梅子置於水中其水過梅子三指為度浸至七日取出曬乾又入水中浸透又曬乾候藥水盡為度欲將梅子入磁瓶密瓶封之如霜衣起更妙若用時以薄綿裹之噙在口令津液徐徐嚥下痰出即愈一梅可治三人不可輕棄青龍膽附治咽喉閉塞腫痛並單雙乳蛾大有神效用青魚膽不拘數以好鴨嘴膽礬逐個裝滿陰乾為末淨用三錢黑牛膽一個以白硼砂裝入陰乾為末淨用二錢山豆根末一錢上三味和勻加冰片三分點至蛾上或吹入神效此二方俱試效過牛蒡子散百二十二治風熱上攻咽喉腫痛或生癰瘡潰爛牛蒡子二錢玄參去蘆升麻桔梗去蘆黃芩犀角鎊木通去皮生甘草各一錢上作一服水二鍾煎八分食後服烏須羊肝丸百二十三不獨烏鬚髮亦能明目黑羊肝一具竹刀切片擺磁盆內羊膽汁塗曬乾日日將膽汁塗曬至百個為上少則三五十個惟膽汁多為佳曬時以稀絹罩之免蠅灰點汗次用當歸四兩酒浸熟地黃用懷慶者酒蒸曬九次干六兩白芍藥酒炒川芎何首烏酒拌洗淨蒸曬乾各四兩覆盆子炒旱連草蒸過山茱萸酒浸去核曬乾淨肉各四兩白茯苓去皮切片人乳浸日曬夜露候乾生地黃懷慶者酒洗各四兩壯血餘並童男童女發自己發胎髮不拘數俱用花椒煎沸湯泡過洗淨曬乾入小瓦罐內黃泥鹽固濟炭火煅通紅埋地中三日取出去土敲破罐刮下研入要以四兩為佳無則一兩亦可上藥俱不犯鐵器各曬乾石磨磨為末另用熟地黃十二兩用酒濃煎汁二碗去渣煮糊為丸如梧桐子大每服空心酒下一百丸臨睡酒下七十丸極能烏鬚髮聰耳明目悅顏色染須方附一方只用釅茶滷調煮起金花為度搽妙五倍子不拘多少去灰研入新鍋內炒存性再以青布兜腳踏成餅以瓦罐收每用一錢麥面炒黃色三分白礬二分食鹽二分紅銅末醋炒通紅再用醋淬研細收貯每用二分上為細末用細茶五錢石榴皮柯子肉各一錢濃煎汁半酒盞調藥於小盞內以銅勺注水將藥盞放勺內漫火煮量入水平盞七分勿令水入盞內煮待藥面如綠雲色皺起為度次將皂角白礬洗淨鬚髮鬢拭乾將盞內藥搽根並須數十次微火烘烙略干卻盡將藥搽染須鬢上以濕紙數層摺貼在須上外以青布兜之至天明須下幹了將溫溫皂角水洗淨根下若黑以指點油擦之少傾以指搽之如須乾燥以絹包核桃肉擦之連染二次如法其光潤可同生成者勺內煮藥水且留每夜擦根下一二次則不生白短根如同自然之妙冬月諸症治例內經云冬三月此謂閉藏水冰地圻無擾乎陽早臥晚起必待日光若有私意若已有得去寒就溫無泄皮膚使氣亟脫此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少大抵冬氣嚴寒萬類潛藏君子固密毋觸冒寒邪其觸冒者即傷寒也悉遵仲景法茲不詳及冬三月太陽寒水用事水旺則火受邪金寡於畏故喘嗽腹滿急痛癥瘕積聚堅痞㿗疝下利清白吐利腥穢中風癱瘓屈伸不便厥逆等症作矣治宜溫中散寒不宜攻下利泄今將冬月諸症宜用諸方詳陳於下對症用之則發無不中矣中風口禁先用通關散吹入鼻中候噴嚏口開次用真正蘇合香丸薑汁調和灌醒後用此方治之白朮天麻當歸川芎桂枝減半半夏南星陳皮各等分上用水煎加竹瀝一盞薑汁半盞和服則漸舒矣通關散百二十四遼細辛去土葉藜蘆生用五錢豬牙皂角去弦子炙赤各一兩上為末每用一字吹入鼻孔中得嚏為妙愈風飲百二十五治半身不遂手足欠利語言費力呵欠嚏噴面木口眼歪斜寬弛頭目眩暈痰火熾盛筋骨時痛頭疼心悸川芎一錢二分當歸一錢二分生地黃薑汁炒八分紅花四分酒洗牛膝八分酒洗半夏一錢薑製熟地黃薑汁炒八分橘紅八分鹽水洗羌活六分防風六分天麻一錢南星薑製一錢白茯苓一錢黃芩八分酒炒薄桂枝六分冬月七分酸棗仁八分炒白朮一錢五分甘草炙四分白芍二錢酒炒黃柏三分酒炒夏月五分上作一服水二鍾煎一鍾臨臥入薑汁淡竹瀝各三茶匙清晨溫服此藥活血消痰疏風順氣走肌表利關節累用極效冬寒之月減黃芩三分加炮川烏二分桂亦減半風病減川烏桂俱不用羌活風家要藥若冬有遇有感冒加至一錢故治風莫先於順氣順則痰清火降而風自息矣烏藥順氣散百二十六治男婦風氣攻注四肢骨節疼痛遍身麻痹手足癱瘓語言謇澀筋脈拘攣及腳氣步履艱辛腰膝軟弱婦人血風並老人冷氣胸膈脹滿心腹刺痛吐瀉腸鳴等症麻黃去節陳皮去白烏藥去木各一錢半川芎枳殼麩炒白芷白姜蠶炒去絲乾薑炒四分甘草桔梗各八分上用姜三片蔥白三寸水酒一鍾半煎八分食遠服拘攣加木瓜石斛各八分濕氣加蒼朮白朮各一錢檳榔七分腳氣浮腫加牛膝五加皮獨活各八分遍身疼痛加官桂五分當歸一錢二分乳香沒藥各七分另研和服腰疼加杜仲一錢大茴香七分虛汗去麻黃加黃耆一錢半潮熱去乾薑加黃芩柴胡青藤根各八分胸膈脹滿加枳實莪朮各八分腋間疼痛加虎脛骨石楠葉青木香各八分頭眩加細辛五分芽茶七分手足不能舉動加防風川續斷威靈仙各一錢陰積浮腫合和五積散四肢皆有疼痹加川烏附子交桂各八分麻痹疼痛極者合三五七散左癱右瘓加當歸天麻白蒺藜各一錢二三年不能行者合和獨活寄生湯服婦人血氣加防風荊芥薄荷各七分風氣日夜疼痛午間輕夜又重合和神秘左經湯豨薟丸百二十七治肝腎風氣四肢無力麻痹筋骨疼痛腰膝痿弱亦能行大腸氣又治二十五般風眼立瘥常服此丸必獲奇效其功不可具述用豨薟草一味此草處處有之俗呼為火杴草其葉對節而生似蒼耳葉用五月五六月六七月七九月九收採洗去土摘其葉不拘多少曝乾鋪入甑中用好酒和蜜層層勻灑蒸之復曬如此九次為末煉蜜為丸如梧桐子大每服四十丸或五十丸空心無灰酒送下搜風順氣丸百二十八治三十六種風七十二般氣上熱下冷腰腳疼痛四肢無力多睡少食漸漸黃瘦顏色不完惡瘡下痿風氣癥瘕氣塊老人小兒皆可服大能補精駐顏疏風順氣車前子二兩半檳榔大麻子微炒去殼另研牛膝酒浸二宿菟絲子酒蒸搗餅曬乾枳殼麩炒郁李仁湯泡去皮另研山藥薑汁炒各二兩防風去蘆獨活去土各一兩山茱萸去核淨肉二兩大黃五兩半生半煨上為末煉蜜為丸如梧桐子大每服三十丸漸加至四五十丸酒茶米飲任下百無所忌空心臨睡各一服久服去腸中宿滯精神強健百病不生耳目聰明腰腳輕健老者反少孕婦弗服如服藥覺臟腑微動以羊肺羹補之又治腸風下血中風癱瘓語言謇澀百病皆治老人尤宜冬月正傷寒悉遵用仲景治法不可移易惟內傷生冷外感風寒頭疼發熱肩背拘急心腹痞悶嘔逆惡風四肢浮腫寒熱往來腰膝疼痛及婦人經候不調並宜服生料五積散百二十九川芎當歸白芍藥各一錢枳殼白芷麻黃去根節半夏各一錢二分厚朴官桂乾薑桔梗茯苓陳皮各八分蒼朮一錢半甘草五分上用姜五片蔥白二根水二鍾煎一鍾溫服甚效足浮腫加和五加皮散老人手足疼痛加和順元散手足風緩加和烏藥平氣散四肢濕痹加和烏藥順氣散因濕所感加和檳蘇散已成風痹加羌活獨活防風婦人經不調加柴胡生地黃加減消風百解散百三十十治冬月傷感風寒頭痛項強壯熱惡寒身體煩痛四肢倦怠痰壅喘嗽涕唾稠黏自汗惡風並宜服川芎白芷陳皮各一錢蒼朮一錢半紫蘇一錢一分麻黃去根一錢半桂枝八分甘草五分上用姜三片蔥白二根烏豆一撮水一鍾半煎一鍾溫服以汗為度無汗再服清肺飲子百三一咳謂有聲肺氣傷而不清嗽謂有痰脾濕動而生痰咳嗽者因傷肺氣而動脾濕也病本雖分六氣五臟之殊而其要皆主於肺蓋肺主氣而聲出也治法雖分新久虛實新病風寒則散之火熱則清之濕熱則瀉之久病便屬虛屬郁氣虛則補氣宜加四君子血虛則補血宜加四物湯鬱則開鬱宜加撫芎香附兼痰則消痰宜加半夏栝蔞仁滋之潤之斂之降之此治嗽之大法也杏仁去皮尖白茯苓各一錢桔梗甘草五味子各五分橘紅七分貝母一錢一分上用姜水煎食遠服凡嗽春多上升之氣宜清肺抑肝加川芎白芍藥半夏各一錢麥門冬黃芩知母各七分春若傷風咳嗽鼻流清涕宜清涼解散加防風薄荷炒黃芩麥門冬紫蘇各八分夏月多火熱炎上最重宜清腑降火加桑白皮知母黃苓麥門冬石膏各一錢秋多濕熱傷腑宜清熱瀉濕加蒼朮桑白皮各一錢防風五分黃芩山梔各七分冬多風寒外感宜解表行痰加麻黃桂枝半夏生薑乾薑防風各一錢肺經素有熱者再加酒炒黃芩知母各五分若發熱頭疼鼻塞聲重再加藁本川芎前胡柴胡各一錢有痰加半夏南星枳實濕痰脾困再加蒼朮白朮各一錢有痰而口燥咽乾勿用半夏南星宜加知母蜜水炒貝母栝蔞仁黃芩炒各一錢夏月熱痰或素熱有痰加黃芩黃連知母各八分石膏一錢半上半日嗽者胃中有火加貝母石膏黃連各一錢五更嗽者加同上黃昏嗽者火浮於肺不可正用寒涼藥宜加五味子五倍子訶子皮各七分斂而降之咳嗽日久肺虛宜滋氣補血加人參黃耆阿膠當歸天門冬款冬花馬兜苓酒炒芍藥之類肺熱喘咳去人參用沙參此兼補血氣也午後咳者屬陰虛即勞嗽也宜補陰降火加川芎當歸白芍藥熟地黃黃柏知母天門冬栝蔞仁各一錢竹瀝薑汁傳送此專補陰血而降火也火鬱嗽謂痰鬱火邪在中宜開鬱消痰用訶子皮香附童便制栝蔞仁半夏曲海石青黛黃芩等分為末蜜丸噙化仍服前補陰降火條所加藥失治則成勞痰積食積作咳嗽用香附栝蔞仁貝母海石青黛半夏曲軟石膏山楂枳實黃連姜炒各等分為末蜜丸噙化勞嗽見血加阿膠當歸白芍藥天門冬知母桑白皮亦於前肺虛陰虛二條參用大抵咳嗽見血多是肺受熱邪氣得熱而變為火火盛而陰血不得安寧從火上升故致妄行宜瀉火滋陰忌用人參黃耆等甘溫補氣之藥然亦有氣虛而咳血者則宜用人參黃耆款冬花等藥但此不多耳因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾但是食積成痰痰氣上升以致咳嗽只治其痰消其積而嗽自止不必用肺藥以治嗽也喘嗽遇冬則發此寒包熱也解表熱自除喘嗽亦止附枳殼桔梗麻黃防風陳皮黃芩木通紫蘇杏仁各等分上用姜三片煎服治風寒鬱於肺夜嗽者宜此方取痰清嗽止亦治喘哮附麻黃不去節根杏仁不去皮尖甘草生減半知母貝母各一錢上用姜三片水煎服有熱加黃芩一錢小青龍湯附治寒嗽極效方見春類治男人痞塊女人血塊此方極效此藥性不猛而功效速阿魏一兩木耳四兩為末生漆濾去渣淨四兩蜜六兩上用錫罐一個盛藥封固放鍋內水煮三炷香了取起冷定每服二茶匙燒酒送下日進三服忌油膩魚發物瓦壟子丸百三十二治血塊丹溪云消血塊極效瓦壟子即花蚶也取殼燒以醋淬三次為末醋膏丸如梧桐子大每服七十丸酒下能消一切血氣癥瘕兼能消痰飲蜀葵膏附用蜀葵根煎湯去渣再入人參白朮青皮陳皮甘草梢牛膝各等分煎成湯入研細桃仁玄明粉各少許乘熱飲之二服當見塊下如病重者須補接之後加減再行此方且攻且補亦有至理通玄二八丹百三十三治腹內飲食宿滯積聚止瀉痢之妙藥如治積聚清晨用薑湯服稍瀉二三行即除卻以溫粥補住如治瀉痢食後用清茶服之即止真仙方也黃連半斤淨白芍藥五錢淨當歸五錢淨烏梅去核五錢淨生地黃五錢淨上為末用雄豬肚一個以藥盛於內用線縫之用韭菜二斤鋪甑底於鍋內蒸之候湯干再添水蒸一日以藥熟為度就豬肚共藥石臼內搗爛為丸如梧桐子大每服七十丸照前引下追蟲黑牽牛四西半生半炒檳榔二兩上二味為末每服大人三錢小兒一錢半五更空心滾水調下凡服藥須上半月蟲頭向上有效若下半月蟲頭向下則不效矣治痞結年久成龜鱉者累用極效附用老軍需一味春夏用莖葉秋冬用根不拘多少用好生酒一罐外用鯽魚一隻和藥同入罐內日落時煮以魚熟為度令患人先食魚次飲酒撲至次早去大小便見物下即是效如不應連服三五次追其物無跡神效妙不可言而仁人君子切不可輕忽按本草云老軍需春夏秋冬常有青出眾草為尊莖藤青葉似檟葉而尖小根如須白似芋頭根牽藤而去俗名社公口須亦治腫毒採根擂生酒服渣敷患處治痞積氣塊神方附其症初則如彈漸長如刀或如梭如碗形狀不同令人面黃體瘦飲食少思久治不痊服此方二月漸消三月斷根用豬澀皮七個即豬赤胰新針七個每澀皮用針一個將針刺破內外外用好明淨皮硝七錢研為細末搽於澀皮上醃七日取出用鐵器焙乾研為細末再用水紅花子七錢焙乾為末與前末和勻每服三錢清晨無灰好酒調服忌生冷房室惱怒不論男婦老少腹之左右並皆治之若頻服五七料大便下濃血即是效驗切不可用別藥補之為妙此藥只可春秋冬合夏恐壞了澀皮若夏月急用將澀皮醃懸放井中一七取出用之亦妙烏梅丸百三十四治酒積消食積化痰飲神效烏梅去核淨肉半斤半夏四兩生薑自然汁半斤白礬四兩上先將半夏烏梅粗末次將白礬化開並薑汁共前末拌勻新瓦二片夾定炭火上焙三日三夜以干為度次入神麯麥芽陳皮青皮莪朮枳殼丁皮檳榔各二兩共為細末酒糊為丸如梧桐子大每服五十丸食遠薑湯下按此方治酒積極效治一切水腫單腹脹蠱脹氣虛中滿神效煎方百三十五茯苓皮草果皮五加皮大腹皮甘草皮牡丹皮地骨皮生薑皮木通皮木瓜皮大腹子車前子葶藶子菟絲子紫蘇子共咀片水二鍾煎至八分服之如要斷根者將十五味藥等分為細末各一錢五分雄豬肝一個不下水者先將溫水煮一滾用竹尖鑽孔數個入藥在內蒸熟切片搗蒜蘸食之不過一二個永不發調中健脾丸百三十六治單腹脹及脾虛腫滿膈中閉塞胃脘作疼並皆神效此藥不傷元氣服有大益白朮一兩黃土水拌炒人參二兩白芍藥二兩半火煨黃耆二兩蜜炙陳皮三兩鹽水拌炒半夏三兩湯炮七次蒼朮二兩米泔浸一宿炒茯苓二兩香附三兩童便浸一宿澤瀉二兩半炒紫蘇子一兩半炒黃連二兩半吳萸水浸一宿炒去萸不用蘿蔔子一兩半炒薏苡仁三兩炒山楂肉三兩炒草豆仁一兩半酒拌炒五加皮二兩炒沉香六錢另研不見火栝蔞煅一兩煅栝蔞法附用大栝蔞二個鏤一孔每入川椒三錢多年糞鹼二錢敲米粒大俱納入栝蔞內外以綿紙糊完再用細紙箸鹽泥封裹完固曬乾入火內煅通紅為度取出擇去泥與黑皮一併入藥上共為細末煎薄荷大腹皮湯打黃米糊為丸如梧桐子大每服百丸日進三次白湯下治心腹痛煎方附半夏一錢二分茯苓陳皮各八分甘草炙四分川芎一錢蒼朮一錢梔子韭根汁炒二錢黑乾薑炒成炭七分存性上用生薑三片水煎服仙方沉麝丸百三十七治心痛腹痛氣痛不可忍三服除根沒藥血竭沉香辰砂各五錢另研麝香三錢另研木香一兩上各研為細末和勻用甘草熬膏為丸如芡實大每服三丸不拘時姜鹽湯嚼下婦人產後血氣刺痛極效若加當歸琥珀各一兩乳香五錢名神仙聚寶丹治心腹痛及婦人血氣腹痛其效尤速親見服者永不再發青娥丸百三十八治腎虛腰膝足痛滋腎益陰壯陽久服奇效破故紙川者佳洗淨酒浸少時隔紙炒香四兩川萆薢真者四兩一兩鹽水一兩米泔水一兩童便一兩無灰酒各浸一宿曬乾杜仲四兩去粗皮薑汁炒去絲胡桃肉湯泡去皮八兩黃柏蜜炒四兩知母蜜炒四兩壯牛膝去蘆酒洗淨四兩上為末春夏用糯米糊秋冬煉蜜將胡桃肉搗爛為膏和勻搗千餘下丸如梧桐子大每服七八十丸空心鹽酒或鹽湯下以乾物壓之當歸活血湯百三十九治寒濕氣血凝滯腰痛當歸酒浸杜仲薑汁炒去絲各五錢赤芍藥白芷威靈仙各三錢肉桂一錢上用水酒各一鍾煎至一鍾空心服加羌活二錢防風一錢亦好頭痛一症屬痰者多有熱有風有血虛此方為主加對症藥立效附片黃芩酒浸炒一錢半蒼朮防風白芷羌活各一錢細辛六分上用姜三片水煎食略遠服左痛屬風與血虛加川芎當歸各一錢半荊芥薄荷各八分右痛屬痰加半夏一錢半茯苓陳皮各一錢甘草生三分瘦人多兼熱倍用酒芩少佐石膏肥人多是濕痰加川芎南星半夏各一錢倍蒼朮痰厥頭痛非半夏不能除頭旋眼黑風虛內作非天麻不能除並宜倍用之治腳氣方百四十累試神效絕勝諸方麻黃三兩去根留節炒黃殭蠶三兩炒為末沒藥乳香另研各五錢丁香一錢上各另研為末和勻每服一兩好酒調下取醉汗出至腳為度蓋俟汗乾即愈後用五枝湯洗用桃柳梅槐桑採嫩枝煎湯先飲好酒三杯再洗腳住痛為妙治諸疝海上方附用黑雄豬腰子一對不見水去膜並內血切片用大小茴香各二兩俱炒為粗末同腰子拌勻再以前豬尿胞一個入腰子茴香末於內札住用生白酒三碗入砂鍋懸煮乾至半碗取胞切碎連藥焙乾為末將前煮藥剩酒打麵糊為丸如梧桐子大每服七十丸空心好酒下立效除根永不再發秘方治外腎被傷偏墜腫大附用雄麻雀三五個去腸肚每個用白礬一錢裝肚內以新瓦二片將雀放瓦中兩頭鹽泥封固以火煅通紅取出存性為末每服一錢空心好酒調下一隻盡全愈此方家傳累用神效治小腸氣痛方附用木饅頭二兩臺烏藥三兩大茴香五錢上三味炒紅研碎後用羌活陳皮防風枳殼各一兩五錢連前和勻為粗末每服一兩水一鍾酒一鍾煎八分空心服三服即消此方亦試有效治腸風臟毒痔漏秘方百四十一用大雄雞一隻罩地板上不與食伺其飢甚別移於淨地上用豬胰四兩切碎漸餵雞待其放屎漸收下如此二三日候雞屎積至四兩曬乾加入後藥透明礬四兩膽礬五錢朴硝二兩千葉雌黃雄黃各六分上各另研為粗末用砂鍋須要寬高貯藥之餘上有半節空者先以雞糞一兩在鍋底次以明礬一兩次以膽礬次以雌黃次以朴硝次以雄黃後盡以明礬在內次加雞糞在上然後以新碗蓋鍋頂簇炭火煅青煙盡力度候冷取出入石碾研為極細面再加乳香沒藥各五錢各研極細和勻以小口磁罐收貯用時唾津調勻於手心以新竹蘸點患處日三五次夜二次先以羊毛筆蘸溫湯洗淨軟絹拭乾然後點藥庶得藥力透肉點後黃水瀝出不止最妙雖多不妨三日後其痔自乾枯剝落倘硬煎湯頻洗自脫腸自紅軟收上忌毒物酒色一月即除根矣內服後方加味臟連丸百四十二治飲酒食炙熱毒下墜為腸風臟毒痔漏下血用雄豬大臟一副去兩頭各七寸用黃連去毛淨末一斤槐花淨末四兩裝入臟內令滿用繩扎兩頭口上用小麥數十粒放甑上蒸三時以臟黑取看小麥極爛為度入石臼搗如泥丸如綠豆大每服百丸空心薄酒下按此方藥價廉而功極大膏粱酒色人尤妙膽槐丹附十月上巳日取槐角子揀肥嫩結實者用新黃瓦盆二個如法固濟埋於背陰牆下約二三尺深預先尋黑牛膽五六枚臘月八日取出裝在膽內高懸陰乾至次年清明日取出新磁罐收貯空心滾白湯下一日一粒二日二粒以漸加至十五日服十五粒止以後一日減一粒至三十日復減至一粒止如此周而復始治一切痔漏功效如神治脫肛附用屋檐前蜘蛛大者一個去頭足烘研為末以生桑葉盛之托肛頭上薰半刻即進去親試神效真人活命飲百四十三一切癰疽腫毒只是熱勝血陰陽相滯而成此方極效天花粉一錢白芷一錢甘草節一錢川山甲三大片以蛤粉炒去粉淨用貝母一錢去心乳香一錢另研藥熟下防風去蘆七分沒藥五分另研藥熟下皂角刺五分當歸酒洗一錢半金銀花三錢陳皮一錢五分去白在背俞皂角刺為君在腹白芷為君在胸加栝蔞仁二錢在四肢金銀花為君疔瘡加紫河草三錢即金線重樓如無亦可上用金華好酒二鍾煎一鍾溫服煎法須用大瓦瓶以紙封固勿令泄氣服時須辨其癰上下上則飽服下則飢服能飲酒者再飲數杯此藥不動臟腑不傷血氣忌酸物鐵器服後即睡覺痛定即回生矣其方神功浩大不可臆度此劑當服於未潰之先已潰不可服二黃散一名陰陽黃附治發背癰疽疔瘡惡節一切無名腫毒惡瘡異症焮熱疼痛初起未潰者服之妙錦紋川大黃二兩一半炭火煨熟不可過性了一半生大甘草節二兩上為細末每服一匙空心溫酒調下一二服以利為度立效如無甘草節終效不速神仙蠟礬丸附消癰疽及腸癰托裡消毒固臟腑護膜止疼黃蠟真者二兩明淨晉礬三兩上先將黃蠟溶開離火候少溫入白礬和勻眾手急丸如梧桐子大每服五十丸食前酒下每日二服按陶節庵曰予詳此方不惟定痛生肌而已護膜止瀉消毒化膿及癰疽內生化毒排膿托裡之功甚大或金石丹藥發疽非此莫能治更用白礬一兩每服一錢溫酒調下尤效有遍身生瘡狀如蛇頭名曰蛇頭瘡尤宜服之每月育育字疑誤丸方有功效若蛇蠍並一切毒蠱所傷以礬溶化熟塗患處內更服之其毒即解誠外科之要藥也服至四兩之上愈見其功大宜其癰疽潰後服之甚穩腸癰尤妙服此即保無虞真良方也神仙太乙膏百四十四治癰疽及一切瘡毒不論年月深淺已成膿未成膿者並宜用之如發背先以溫水淨洗軟帛拭乾用緋絹攤貼之更用冷水送下其膏可收十餘年不壞愈久愈烈又治瘰癧瘡並用鹽湯洗貼仍用酒下百丸婦人經候不通作丸甘草湯下一切疥瘡用麻油煎滾取少許和膏塗之虎犬蛇蠍湯火刀斧傷者皆宜內服外貼玄參白芷赤芍藥當歸生地黃肉桂大黃各一兩上切片用麻油二斤入銅鍋煎至黑濾去渣入黃丹十二兩再煎滴水捻軟硬得中即成膏矣制丹法用黃丹先炒紫色傾入缸內用滾水一桶泡之再吸涼水滿缸用棒常攪浸一宿去水再炒如前二次研末用按陶節庵云予嘗用此膏此瘡毒並內癰有奇效忽一婦月水不行腹結塊作痛貼臍下經行痛止後隨症外貼內服無有不效者楊梅瘡潰爛者尤效愈見此方之妙也彭幸庵都憲治發背方附凡人中熱毒眼花頭暈口甘舌苦心驚背熱四肢麻木覺有紅暈在背後即取槐子一大抄揀淨鐵杓內炒褐色用好酒一碗煎滾去渣熱服酒盡大汗即愈如未退再依前煎服縱成膿者亦無不愈此三十年屢用屢驗之奇方也忍冬花酒即金銀花也附治一切癰疽發背疔瘡乳癰便毒喉閉乳蛾等症不問已潰未潰用金銀花連莖葉搗爛取汁半鍾和熱酒半鍾熱服甚者不過三五服即愈如無鮮者用乾的一二兩水一鍾煎半鍾衝上熱酒半鍾和服此二方其藥易得其功甚大山鄉僻邑無醫之處尤宜知此法以備不虞治癰疽發背灸法附累用累驗凡人患癰疽發背已結未結赤熱腫痛先以濕紙覆其上其紙先干處即是疽頭結處取大瓣蒜切如三錢厚安在頭上用大壯艾灸之三壯換一蒜痛者灸至不痛不痛者灸至痛方住最要早覺早灸為上才發一二日十灸十愈三四日十灸七愈五六日三四愈過七日則不宜灸若有十數頭作一處生者用蒜研成膏作餅納瘡頭上聚艾灸之亦能安也若背上初起未腫內有一粒黃如粟米即用獨頭蒜切片如前法灸之次日去痂膿自潰矣極效不可言夏枯草湯附治瘰癧馬刀已潰未潰或日久成漏者用夏枯草六兩水二鍾煎至七分去渣食遠服此生血清熱治癧之聖藥也虛甚宜煎濃膏兼十全大補湯加遠志貝母香附和服並以膏塗患處佳三奇湯百四十五治楊梅瘡疳瘡便毒四服其毒即化為膿從大便瀉出極效故名三奇也並治諸腫毒初起亦效金銀花二錢赤芍藥甘草節川山甲蛤粉炒各一錢白蒺藜去刺二錢白殭蠶炒連翹當歸尾各一錢半蜈蚣一條去頭足尾大黃虛人三錢實人五錢皂角刺一錢上用水酒各一鍾煎一鍾病在上食後服病在下食前服附治楊梅瘡神秘二方先服四帖後服三帖七日全好經驗過防風皂角刺天門冬黃芩栝蔞仁金銀花各五分當歸熟地黃木瓜薏苡仁紫花地丁白鮮皮木通各一錢甘草三分土茯苓四兩上用水三鍾煎二鍾作二次服渣再煎此方先服又方後服附前方去木瓜木通紫花地丁白鮮皮四味加桔梗七分減土茯苓二兩半照前煎服忌椒酒煎炙牛肉茶房室按此二方先服效速毒即出而易好後服平和而瘡自內消一方大黃一兩後下百麻一兩威靈仙一兩連翹三錢川山甲三錢炒蟬蛻二錢生羊肉一斤用水五碗煮羊肉以熟為度其汁入前藥煎至一碗先食羊肉或鹽或醬油食之後服煎藥大黃不可熟候半月後再一服即愈治疳瘡搽方附見效極速用多年牆上白螺螄殼不拘多少洗去土淨火煅研為極細面用六分上好眼藥柸四分冰片五釐另研和勻米泔水洗淨瘡拭乾將藥搽上就結靨勿爬破任其自落已試驗過又方附紅𣮷燒灰存性五錢干桃樹上乾者燒灰存性五錢爐甘石火煅黃色童便淬七次二錢半上為細末臨搽入片腦少許其瘡先用椒蔥湯洗淨後以藥搽上三次即愈已試驗過五虎湯百四十六治魚口瘡俗名便毒已成者即潰未成者即散五靈脂木鱉子去殼川山甲蛤粉炒白芷和二錢五分大黃實人一兩虛人五錢上作一服水二大鐘煎一鍾空心服利五七行即好一方加全蠍五分殭蠶二錢尤妙治癬妙方附川槿皮滑石白薇各二錢鷹糞七分斑蝥去翅頭足十個蚯蚓泥干一錢七分青娘子紅娘子各四個上為末井花水調厚敷患處多年者五次新近者三次除根治風癬膿疒公𧘇疥瘡煎方一應諸瘡毒皆宜服無不效者百四十七當歸身尾一錢半赤芍藥黃芩黃連黃柏各一錢大黃三錢七分防風八分木鱉子一個去殼金銀花苦參各一錢二分上用水一鍾酒一鍾煎至一鍾後下大黃煎三四沸取起露一宿五更服若腸風臟毒下血去木鱉子加槐花一錢驗大楓膏附搽膿疒公𧘇疥瘡神效先服前煎藥二服再搽三五日全可大楓子去殼四十九個杏不去皮尖四十九個川椒枯礬輕粉水銀代亦可蛇床子另研淨末樟腦各三錢蜂窩火燒存性蛇蛻火燒存性各三分櫃油燭三兩上將諸藥研細以櫃油燭化開和勻調塗三五日即愈治濕瘡並臁瘡膏百四十八黃蠟一兩頭髮一拳大香油一兩輕粉二錢另研豬膽二個上先將香油熬四五沸次下黃蠟又熬四五沸次下黃蠟又熬四五沸再後下頭髮文火熬用槐柳條不住手攪候發消化濾淨後下輕粉略熬一時取起放磁碗內冷水浸少頃即成膏一切濕瘡臁瘡貼半日黃水流出拭乾加藥再貼一七全愈又方用大楓子肉杏仁松香花椒蔥頭搗爛作餅如瘡樣貼之每日一換貼膏時用米泔水洗之又臁瘡方附黃丹官粉各等分為末用油紙將黃蠟溶化塗紙上將藥摻貼瘡上立效治臁瘡海上方附賽隔紙膏一七全愈嫩槐條四寸九分嫩柳條四寸九分頭髮一尺長四十九根上三味燒灰存性為末川椒四十九粒輕粉真者三錢黃蠟一兩香油一盞上將香油黃蠟熬熟放冷卻下輕粉次下三味灰末攪勻用厚綿紙如瘡大十二片將藥塗盡其瘡先用黃柏荊芥湯洗淨將十二片紙重重貼上以繩縛定其癢不可當次日除去貼肉一層又以前湯洗淨再貼六日除去六層全好此絕妙法也治腳指縫爛瘡附用鮮鵝掌黃皮陰乾燒灰存性為末乾摻極效治手足凍瘡附用冬瓜皮干茄根二味煎湯熱洗不過三次即效治熱瘡遍身發出膿血赤爛如火丹或如火燒者百四十九黃連黃柏各三兩赤小豆綠豆粉各一兩寒水石紫草漏蘆各七錢上為末用香油調搽一日三次即愈治火丹用黃鱔頭上血塗即愈如冬月無以螺螄肉搗爛絞汁塗之亦可附治湯泡火燒方先以蠟酒冷洗以拔其毒再用雞蛋十餘個煮熟去白以黃炒焦黑取油約一盞用大黃研末二兩調勻敷上三日全好無瘡痕附治四塊鵝掌風百五十用千里光草一大握蒼耳草一中握朝東牆頭草一小握共入瓶內水煎百沸以手少擦麝香以瓶薰之仍用絹帛係臂上勿令走氣薰三次即愈千里光草即金釵草是也附治腳墊毒人腳走長路系被石塊腳底墊腫不能行步痛不可忍急用舊草鞋浸於尿桶內一宿或半日外用新磚燒紅將浸草鞋放在磚上以腫腳踏在上火逼尿氣入里即消此症諸方不載如不早治爛人腳甚至殺人走長路腳腫痛亦可用此法即消治拍蟹毒百五十一人大指次指隔界處忽生腫毒痛不可忍若不早治必爛人手用鮮蟹研爛塗患處立消附治身上虛癢用四物湯加黃芩煎調紫背浮萍末一錢或凌霄花末一錢尤妙
