body:
  text: 卷四濟陰類凡婦人小兒老人諸症除婦人胎產經候小兒驚疳變蒸痘疹老人血氣衰憊水火升降失度與大人治法不同故另立方法其餘症同大人者悉照前四時方法用四物湯百五十二治婦人之總藥隨症加減妙用無窮方見滋補類加減於後經水過期不行血寒血少也本方五錢加香附莪朮各一錢蘇子八分桃仁三十粒紅花官桂木通各七分甘草三分空心煎服經水先期而來血熱也加黃柏知母條芩黃連各七分甘草三分生人參阿膠艾葉各五分香附荊芥穗各一錢空心煎服血枯經閉本方一半加桃仁紅花共五錢空心煎服色淡者痰多也本方去地黃加二陳湯等分和服紫黑者血熱也本方五錢加黃芩黃連荊芥穗各一錢臨行腰腹疼痛乃鬱滯有瘀血加桃仁紅花莪朮玄胡索香附各一錢木香五分另磨入潮熱發熱本方五錢加地骨皮薄荷各一錢五分柴胡防風各五分甘草三分烏梅一個同煎食遠服虛寒者用熟地黃加乾薑官桂吳茱萸各一錢甚者再加熟附子一錢虛極者本方與四君子等分加黃耆一錢半熟附子七分經行不止者本方加真阿膠艾葉地榆荊芥穗各一錢妊娠胎動加香附砂仁紫蘇各七分白朮條芩各一錢阿膠炒八分蘄艾五分去生地黃用熟地黃胎前產後血痢加黃連地榆阿膠艾葉各八分厚朴五分五心煩熱加柴胡黃芩地骨皮各一錢甘草三分麥門冬八分有死胎加交桂麝香白芷赤白帶下加藁本牡丹皮川續斷各八分產後惡露作痛加香附一錢乾薑炒黑七分生蒲黃陳皮各八分產後發熱加白朮茯苓陳皮黑乾薑各八分久無子息加附子肉蓯蓉各一錢熟地黃鹿角膠各一錢半烏骨雞丸附治婦人經候不調並胎前產後一切諸症調經育子之上藥也累用奇效香附二斤蘄艾去梗淨二斤上二味分作四分每分一斤一分老酒一分米醋一分童便一分糯米泔各浸一宿炭火煮爛熟為佳石臼內木槌搗成薄餅曬乾磨為末聽用大白毛烏骨雞一隻吊死去毛熱湯修理腸雜潔淨勿見生水再用當歸酒洗淨四兩白芍藥酒炒四兩熟地黃酒浸忌鐵器四兩人參去蘆二兩黃耆蜜炙二兩白朮炒陳皮去白白茯苓去皮砂仁炒各一兩五錢烏藥炒一兩神麯炒甘草炙各七錢五分上藥十二味制淨為粗末裝入雞肚內以線縫住仍用老酒米醋童便米泔等分入砂鍋內炭火煮令爛熟去骨石臼搗成餅曬乾磨為細末聽用再加木香沉香各五錢不見火官桂乾薑炒半黑各三錢上四味另研為細末聽用上三次藥末和勻重羅篩過煉蜜丸如梧桐子大每服七十丸空心滾水打鹽湯下愚按此方血虛多郁婦人服極效濟陰返魂丹百五十三治婦人胎前產後總藥一名益母丸用益母草一味其草即茺蔚子其葉類火麻對節而生方梗凹面五六月間節節開紫花白花者不是南北隨處有之於端午小暑或六月六日花正開時連根收採透風處陰乾不犯銅鐵器石臼木杵搗羅為細末煉蜜為丸如彈子大每服一丸各照後開引下或量加當歸赤芍藥木香尤妙其藥不限丸數以病愈為止日服三五丸或丸如梧桐子大每服七八十丸空心食遠照後引下或熬膏調引用尤妙熬膏法附益母草不拘多少連根莖葉洗淨入石臼內搗爛以布濾取濃汁入砂鍋內文武火熬如黑砂糖色為度以磁瓶收貯每用一茶匙照後開引調用極效胎前臍腹刺痛胎動不安下血不止煎秦艽當歸糯米湯下胎前產後臍腹作痛作聲或寒熱往來如瘧狀者並用米湯下臨產併產後各先用一丸童便酒化下安魂定魄調血順氣諸病不生又能破血止痛養脈息調經絡其功甚大產後胎衣不下落在胞中及產前一切難產並橫生逆產胎死經日不下腹中脹滿心下悶痛炒鹽湯下產後中風牙關緊急半身不遂失音不語童便酒各半化下產後氣喘咳嗽胸膈不利吐酸水面目浮腫手足疼痛舉動失力者溫服下產後兩太陽穴痛呵欠怔忡氣短肢體羸瘦不思飲食血風身熱手足頑麻百節骨痛米湯下產後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁下如無濃煎薄荷湯或童便酒各半下產後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童便酒各半下薄荷湯亦可產後瘀血惡露不盡結滯臍腹刺痛惡物上衝心胸滿悶童便酒下產後未經滿月氣血不通咳嗽四肢無力臨睡自汗不止月經不調久而不治則為骨蒸瘵疾童便酒各半化下產後鼻衄口乾舌黑童便化下產後大小便不通煩燥口苦者薄荷自然汁下如無生的乾的濃煎湯亦可產後赤白痢疾米湯下產後瀉血水濃煎棗湯下產後赤白帶下阿膠艾葉湯下血崩漏下糯米湯下婦人久無子息溫酒下一日一丸至三五十丸決有效驗勒奶痛或成癰為末水調塗乳上一宿自瘥或生搗敷上亦可上一十九症調引歷歷有效不能盡述用者自知其妙也蒸臍法百五十四治婦人月經不通或癥瘕血塊臍腹作痛此方神效乳香沒藥血竭沉香丁香各三錢麝香一錢上六味各另研青鹽食鹽五靈脂兩頭尖各六錢四味共為末上各末和勻外用麝香少許安入婦人臍內次將面作條方圓一寸繞臍圍住安藥末於內令滿以槐樹皮方圓一寸蓋上皮上鑽三孔用大艾炷灸之月經即通血塊即消累用神效紅花當歸丸百五十五治婦人血臟虛竭經候不調或斷續不來或積瘀成塊腰腹刺痛肢體瘦弱馬鞭草半斤劉寄奴半斤二味共熬膏丸藥當歸三兩酒洗赤芍藥牛膝去蘆酒浸川芎香附醋炒牡丹皮去木甘草各一兩半紅花白芷各七錢半官桂六錢紫葳即凌霄花蘇木各三兩枳殼炒一兩上為末以前膏入少糯米粉打糊為丸如梧桐子大每服七八十丸空心濃煎紅花酒送下濟陰百補丸百五十六治女人勞傷氣血不足陰陽不和作寒作熱心腹疼痛胎前產後諸虛百損並宜用之當歸酒洗曬乾六兩熟地黃酒洗一錢香附子一斤分四制醋酒童便鹽水各浸三日炒乾白芍藥酒炒一錢川芎一錢益母草五月五日採者佳忌鐵淨末半斤甘草炙一兩白茯苓去皮三兩玄胡索炒二兩人參去蘆二兩木香不見火白朮土炒各四兩上為細末煉蜜為丸如梧桐子大每服六七十丸漸加至八九十丸空心米湯酒任下按此方調脾胃補虛損極效治赤白帶下神方百五十七樗根白皮香椿根白皮苦參香附醋炒梔子仁炒山茱萸去核黃柏鹽酒炒龜板去弦酥炙各二兩乾薑炒五錢貝母去心一兩白朮炒當歸酒洗各一兩五錢白芍藥酒炒一兩上為末酒糊為丸如梧桐子大每服八十丸空心清米湯送下若孕婦赤白帶加蒼朮條芩川連白芷各一兩去乾薑樗皮貝母苦參龜板梔子為丸服固真湯附治婦人赤白帶下行時臍下甚痛此方二服即效人參五分黃芩黃柏白葵花各一錢郁李仁八分柴胡七分陳皮去白八分甘草炙乾薑炒各三分上用水一鍾半煎七分空心服葵花白者治白帶赤者治赤帶赤白混下二花並用按此方治氣血滯陰陽不清極效涼血地黃湯百五十八婦人血崩來如山崩水湧之勢明是血熱妄行豈可作寒論治宜清補兼升提不可驟止徐徐調理血清自歸源矣黃芩甘草生荊芥穗蔓荊子各七分黃柏知母藁本川芎細辛各六分黃連羌活柴胡升麻防風各五分生地黃當歸各一錢紅花少許上用水一鍾半煎八分空心稍熱服渣隨並服六合散百五十九治血崩不止諸藥不效此方立止此急則治其標也杏仁皮燒存性香附童便浸三日炒黑舊紅𣮷子燒存性地膚子炒舊棕薦燒存性壯血餘燒存性蟹殼燒存性陳蓮蓬燒存性上為末每服三錢用酸漿草汁一鍾衝上熱酒一鍾空心熱服按此方初服反覺多以漸而少由紫色而紅以至於無即止既止之後用十全大補湯二十帖調補方杜根矣保胎丸百六十專治累經墮胎久不育者宜服過七月不必服白朮四兩鼠尾條黃芩當歸酒洗人參杜仲炒去絲各二兩川續斷酒浸一兩半陳皮一兩熟地黃懷慶者酒浸蒸一兩半香附一兩童便浸炒上為細末糯米糊為丸如綠豆大每服七十丸空心白湯下安胎飲百六十一治胎動胎漏不安一服立效白朮一錢二分條芩一錢陳皮去白八分真阿膠炒珠一錢桑寄生真者一錢甘草四分蘄艾五分當歸頭六分陳枳殼五分砂仁炒六分川獨活五分白芍藥酒炒一錢二分上用姜一片棗一枚糯米百餘粒水煎空心服加味六君子湯百六十二妊娠二三月時作嘔吐名曰惡阻惡阻者噁心而阻隔飲食也此方主之半夏湯泡七次曬乾切片再以生薑自然汁拌白茯苓去皮另一錢五分陳皮一錢人參八分白朮炒砂仁炒各六分甘草二分上用姜三片煎食遠溫服芎蘇散百六十三治妊娠傷寒頭疼身痛發熱胸膈煩悶兀兀欲吐法禁汗吐下止宜和解方見春類妊娠傷寒熱病護胎法附安胎飲用伏龍肝即灶心土井水調塗臍下干又塗之就以井花水調服一錢產難細研一錢酒調服亦妙十聖散百六十四小產一症多因本婦氣血不足胎無所榮血不足胎無所養榮養失宜猶樹枝枯而果落豈不傷枝損葉乎其間過傷飢飽勞佚動胎惱怒憂思內外寒冷傷於子臟又須量輕重而加減治之此藥性平和滋血養氣須月服五四貼方好或素有墮胎之患者亦宜按法用之仍忌惱怒生冷酒醋熱物人參去蘆黃耆各八分白朮炒一錢砂仁炒五分甘草三分熟地黃酒洗白芍藥酒炒當歸身酒洗各一錢川芎七分川續斷七分上用姜一片棗一枚水一鍾半煎八分食遠服三合濟生湯百六十五治臨產艱難雖一日不下服完自然轉動下生枳殼二錢麩炒香附炒一錢甘草七分川芎二錢當歸三錢蘇葉八分大腹皮薑汁洗一錢半上用水二鍾煎至一鍾待腰腹痛甚時通口服之即產九月尾下月頭先服一二服尤妙此方用效陳繼崖驗方當歸五錢川芎三錢枳殼二錢鱉甲五錢酒醋炙淬七次坐產以水煎服頃刻就下催生不傳遇仙丹百六十六治難產累用效見神速萆麻子去殼十四粒硃砂另研雄黃另研各二錢半蛇蛻一條全上為細末粥糊為丸如彈子大每服一丸臨產時先以川椒湯淋洗臍下納藥一丸以黃紙數重覆藥上軟帛拴系產則急取去之否則連生腸俱下一丸可用三次若誤致生腸下即以本藥放頂門上即收神效治胎衣不下神方附凡產後胎衣不下惡血湊心迷悶須臾不救產母即危此方可預合下以備用真濟世救急之神方也乾漆二錢為末大附子一枚炮去皮臍為末上二味和勻外用大黃五錢為末酒醋熬成膏子和前末為丸如梧桐子大每服三十丸淡醋湯下一時連進三服胎衣即下神效治胎衣不下一時無藥者附用皮硝三錢為末童便調熱服即下亦治橫生逆產仍將本婦手足爪甲炒黃為末酒下一匕更令有力穩婆將產婦抱起將竹筒從心上趕下如此數次即下治橫生逆產方百六十七其症孕婦欲產時遇腹痛不肯舒伸行走多曲腰眠臥忍痛其兒在腹中不得轉動若手先出謂之橫生足先出謂之逆產須臾不救子母俱亡此方立效烏蛇蛻一條蟬蛻十四個去土柳樹上者佳壯血餘一球胎髮更好上各燒灰存性為末每服二錢酒調下連進二服仰臥片時兒即下附又法用小針於兒腳心刺三五針急以燒鹽少許塗刺處即時順下子母俱活附治血暈昏迷欲死者急取韭菜根一大握切細放在小口瓶內用滾熱酸醋泡在瓶中將瓶口沖在病人鼻口內使韭氣直衝透經絡血行即活再用後方輕則燒舊漆器薰鼻亦好清魂散百六十八治產後眩運血暈二症又能清血行經逐舊養新澤蘭葉荊芥穗各二兩川芎一兩人參五錢甘草四錢上為細末每服二錢煎蔥湯或酒送下煎服亦可附產後調補氣血方人參白朮各一錢甘草川芎各七分當歸八分黃芩陳皮各五分熟地黃酒洗一錢上用薑棗煎食遠服如發熱輕則加茯苓一錢淡滲其熱重則加乾薑炒黑一錢以散其熱或曰大熱何以用乾薑曰此非有餘之熱乃陰虛生內熱耳蓋乾薑能於肺分利肺氣入肝分引血藥生血然必與補陰藥同用乃效此造化自然之妙非天下之至神其孰能與於此乎治產後敗血不止小腹繞臍作痛俗名兒枕痛此方一服即愈百六十九生蒲黃川芎白朮神麯陳皮桃仁各七分香附童便炒一錢五分甘草四分當歸尾淨一錢半上用水一鍾半煎七分不拘時熱服烏金散附治產後一十八症第一胎死不下二難產三胎衣不下四產後眼花五產後口乾心悶六寒熱似瘧七敗血流入四肢浮腫寒熱不定八血邪顛狂語言無度九失音不語十心腹疼痛十一百節骨痠疼十二敗血似難肝十三咳嗽寒熱不定十四胸脅氣滿嘔逆十五小便澀十六舌乾鼻中血出繞項生瘡十七腰疼如角弓十八喉中如蟬聲以上症候並宜服之烏金子即大烏豆肉桂去粗皮當歸去蘆酒洗烘乾真蒲黃木香青皮去白壯血餘燒存性赤芍藥炒皂莢不蛀者燒存性紫葳即凌霄花大薊根小薊根蠶蛻紙新綿亦好燒存性棕毛燒存性以上各五錢紅花乾者一兩川烏一個生用硃砂少許另研血竭少許另研上十八味除灰藥另研外共為細末入另研藥和勻每服一錢生薑湯或芍藥當歸湯或凌霄花煎酒調下甚者一夜三四服忌魚鵝豬羊及一切生冷油炙等物取效甚速大黃膏治症照後調下隨症消息加減妙不可言百七十用錦紋川黃不拘多少米泔水浸經宿去粗皮曬乾為細末聽用外用陳米醋酌量多少熬待稠黏漸入大黃末不住手攪令極勻以磁器貯之紙糊封口毋致蒸發臨時量病虛輕重入在烏金散內服之人壯病實者半彈丸以下漸少或以膏子丸如龍眼大一樣芡實大一樣皂子大一樣陰乾磁器密收看病大小用一丸與病人嚼破以烏金散送下產後內熱惡露作痛俗名兒枕痛及大便不利秘結者並用四物湯浸化一丸服發寒熱如瘧或內熱者煎小柴胡湯浸化一大丸服之未效再服並不噁心口中吐酸水面目浮腫兩脅疼痛舉動失力者溫酒下產後兩太陽痛呵欠心忪氣短肢體羸瘦不思飲食血風身熱手足頑麻百節疼痛米湯下產後眼前黑暗血暈血熱口渴煩悶狂言如見鬼神不省人事濃煎薄荷湯下或童便各半下亦可產後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童便酒各半下或薄荷湯亦可產後血餘惡露不盡結滯腹臍刺痛惡物上衝心胸悶滿童便酒各半下產後未經滿月血氣不通咳嗽四肢無力臨睡自汗不止月水不調久而不治則為骨蒸瘵疾童便酒各半下產後鼻衄口乾舌黑童便酒下產後大小便不通煩燥口苦者薄荷自然汁下如無濃煎薄荷湯下產後赤白痢疾陳米湯下產後漏血水棗湯下產後赤白帶膠艾湯下血崩漏下糯米湯下勒奶痛或成癰水搗膏敷乳上一宿自瘥抑肝散百七十一治寡居獨陰婦人惡寒發熱全類瘧者久不愈即成瘵疾柴胡二錢半赤芍藥牡丹皮去心各一錢半青皮炒二錢當歸五分生地黃五分地骨皮一錢香附童便炒一錢川芎七分連翹五分山梔仁炒一錢甘草二分神麯炒八分上用水煎空心服渣再煎下午服夜服交感丹一丸方見秋類此二方累試累效附治婦人生下孩兒但不能發聲謂之夢生世俗多不知救深為可憫今後有此切不可斷臍將胞衣用火炙令暖氣入兒腹內卻取貓一隻用青袋包裹其頭足使一伶俐婦人拿住貓頭向兒耳邊以口著力咬破貓耳貓必大叫一聲兒即省開口發聲遂得生矣附又法兒因難產或逆產下不哭微有氣者即以本父母真氣度之亦活二法皆經驗慈幼類治驚風方附凡小兒急驚屬肝木風痰有餘之症治宜平肝鎮心驅風消痰降火清內熱慢驚屬脾土不足因吐瀉久虛元氣不固或大病後元氣不足宜補中兼疏利世俗以一藥通治二症者甚妄急驚神方百七十二牛膽南星四錢半全蠍二錢荊芥穗防風去蘆姜蠶炒天竺黃各三錢辰砂天葵草伏過一錢六分另研琥珀牛黃另研蟬蛻木香各一錢五分上為末山藥打糊為丸如龍眼大硃砂為衣每服一丸薑湯化下此吉水鄧小兒家傳極效又方附治急驚車前子三錢輕粉一錢麝香三分另研片腦分半另研牛黃一錢另研全蠍十四個天麻二錢牛膽南星二錢白附子一錢硃砂三錢另研青黛一錢珍珠一錢另研男兒乳一盞生人血二匙上為末各研和勻粟米糊為丸如黃豆大硃砂為衣每服一丸荊芥薄荷湯磨下先用半丸研細吹入鼻中外用石腦姜蠶去嘴調塗人中立效慢驚秘方附急驚日久不止亦可用人參白茯神去皮心琥珀姜蠶全蠍防風去蘆牛膽南星白附子生用蟬蛻去土蘄蛇肉各二錢辰砂一錢另研麝香二分上為末煉蜜為丸黃豆大硃砂為衣每服一丸菖蒲湯化下急驚薄荷湯化下此二方蕪湖夏小兒世傳極效慢驚神效方附人參一兩姜蠶炒三錢全蠍二錢生人血二匙辰砂二錢另研為衣上為末用麻黃一兩甘草一兩熬膏為丸如櫻桃大硃砂為衣每服一丸南棗煎湯化下此邵伯仲小兒方累用累效秘傳牛黃清心丸百七十三治小兒驚風大人中風中痰中氣一切風痰之症天麻四兩防風二兩去蘆牛膽南星二兩半姜蠶炒全蠍各二兩半白附子生用干天羅即絲瓜五錢川烏五錢遠志去心二兩川山甲蛤粉炒三兩蟬蛻二兩去土蒿蟲不拘多少辰砂天葵煮一兩雄黃一兩二味另研犀角鎊細五錢蜈蚣三錢蟾酥五分另研沉香三錢細辛五錢龍齒五錢琥珀二錢另研珍珠三錢另研天竺黃三錢蛤蚧一對金銀箔各十帖上藥各制淨為末外用荊芥一斤麻黃一斤木通一斤皂角半斤甘草四兩蒼耳子四兩六味熬膏人真酥合油和蜜為丸芡實大金銀箔為衣蠟封隨症調引用回生錠百七十四治慢驚聖藥一錠即有起死回生功頃刻見效故名為回生錠真海上仙方也急驚亦效人參五錢白朮一兩山藥一兩真赤石脂煅五錢淨假的不用甘草辰砂各二錢桔梗一兩白茯苓去皮一兩滴乳香二錢另研麝香一錢另研牛黃一錢另研牛膽南星五錢礞石煅金色三錢金箔十片為衣上為末五月五日午時取粽搗勻印作錠子金箔為衣陰乾每服大人五分小兒二分薄荷湯下秘方黑神丸百七十五治急驚風垂死者一服可即活膩粉香墨白麵各二錢蘆薈一錢八分牛黃另研青黛飛淨使君肉去殼淨各一錢辰砂一錢半另研麝香五分另研冰片二分另研金箔十片上為末麵糊為丸黃豆大金箔為衣每服一丸薄荷湯下治急慢驚風海上方附用五月五日午時取白頭蚯蚓不拘多少去泥焙乾為末加辰砂等分和勻糯米糊為丸綠豆大金箔為衣每服一丸白湯下取蚯蚓時先以刀截為兩段看其斷時跌快者治急驚跌慢者治慢驚作二處修合極效附仙傳救急驚神方附並治大人中風中痰立服立效不許受謝並食病家茶酒犯者不效用生白石膏研末十兩辰砂研末五錢二味和勻每服大人三錢小兒一歲至三歲一錢四歲至七歲一錢五分八歲至十二歲二錢十三至十六歲二錢五分用生蜜調下立效按此二方價不貴而功極速累用累效千金肥兒丸百七十六小兒疳症因脾家有積脾上虛而肝木乘之所致積久不散復傷生冷厚味故作疳症肚大筋青潮熱咳嗽胸前骨露治法調脾胃養血氣為主其次消積殺蟲散疳熱白朮半斤真茅山蒼朮半斤陳皮一斤不去白甘草一斤炙為末用留一半為衣厚朴一斤用乾薑半斤水拌令潤透同炒乾去姜不用賴蛤蟆十隻蒸熟焙乾為末禹餘糧煅一斤如無以蛇含石代川黃連一斤用苦參四兩好燒酒一斤二味拌盒一時焙乾去參神麯一斤炒牡蠣煅七次童便淬七次淨一斤青蒿一斤童便製為末山楂去核一斤鱉甲醋炙一斤胡黃連半斤蘆薈四兩夜明砂淘淨四兩使君子去殼淨肉四兩鶴蝨不拘多少上前藥各制淨為末外用小紅棗五斤去皮核黃耆三斤當歸一斤熬膏入面一斤打和作糊為丸如綠豆大以前甘草末半斤擂丸小茴香末各四兩為衣每服八歲以下五十丸九歲以上七十丸食前清米湯送下累用神效消疳餅百七十九專治諸疳積累試極驗兒又肯用夏月取癩蛤蟆百餘隻端午前後取的更佳去頭足腸肚皮骨另放一處先將肉香油煎熟與兒吃再將皮骨腸肚以缽頭盛放烈日中上用稀篩蓋之任蒼蠅攻鑽生蛆食骨上肉盡然後取蛆洗淨炒乾用重紙包灰火內煨焦存性為末每末一兩加入後藥胡黃連二兩山楂肉去子淨四兩真蘆薈二兩砂仁二兩青皮去白麩炒一兩蕪荑一兩檳榔二兩蒿心末一兩西涯木香五錢上為末除渣淨一斤外用陳麥面十斤沙糖二斤餳糖一斤將藥面糖和勻如金花餅法造成餅子一兩重一個每日空心食一個米湯下能消疳磨積如神小兒逐日用之極妙附治小兒吐瀉由寒熱不勻內傷脾胃所致泄瀉痢疾亦由濕熱積滯而成治宜消積理脾為要後二方主之加減錢氏白朮散百七十八治吐瀉極效人參五分白朮八分白茯苓六分甘草二分陳皮六分半夏七分藿香砂仁乾葛各五分上用水一鍾煎六分入薑汁一匙和勻服香橘餅百七十九治小兒疳積下痢並久瀉不止或冷熱不調赤白膿血相雜小腹疼痛或禁口不食裡急後重日夜無度經久不瘥致脾虛脫肛不收並宜服之陳皮去白青皮去穰麩炒厚朴薑製青木香山楂肉去核淨神麯炒麥芽炒白朮炒各四兩三稜醋炒二兩莪朮醋炒一兩香附炒砂仁炒甘草炙人參滋潤有潤者去蘆各二兩木香不見火五錢上為極細末煉蜜和勻印作錠子每餅濕時重二錢陰乾每服一餅空心米湯化下立效大人亦可用白朮助胃丹百八十治小兒吐瀉大能和脾胃進飲食化滯磨積白朮一兩五錢陳土炒人參六錢白茯苓去皮一兩甘草炙五錢白豆蔻大者去殼十五粒砂仁大者四十粒炒肉豆蔻中大四個雞蛋清炒木香二錢山藥薑汁炒一兩上為極細末煉蜜丸如皂子大每服一丸空心米湯化下治小兒食傷宜服此方消導之百八十一白朮一錢陳皮七分麥芽一錢厚朴六分甘草四分枳實六分傷乳及粥飯米曲加神麯真炒香一錢半夏六分更增麥芽五分若傷魚肉果子等食加山楂一錢炒砂仁五分黃連三分草果三分傷生冷之物腹痛泄瀉清冷色白加砂仁山楂神麯各八分煨木香四分乾薑炒紫黑三分傷辛熱飲食或傷食停積日久食鬱作熱嘔吐酸水或大便積痢不快或黃黑色此有熱也加姜炒黃連七分山楂川芎各五分木香三分尋常些小傷食不必服藥只用麥芽入姜二片煎湯飲之上藥用姜二片水一鍾煎六分食前服若飲食傷脾胃食積在內作熱見於肌表或潮熱往來只宜理中而表熱自除不可解表宜用前方加山楂白芍藥升麻乾葛各八分生甘草二分炙甘草二分黃連五分以消食積之熱表熱未除亦宜加除脾胃之熱熱壯盛脈有力者更加煅石膏一錢此皆太陰陽明二經藥也治小兒服前消導藥積去後泄瀉不止服此方調補脾胃止瀉白朮一錢二分白茯苓一錢白芍藥一錢酒炒木香煨甘草炙肉豆蔻各四分黃連姜炒神麯姜炒陳皮各六分乾薑炒半黑二分半上用姜二片煎食前溫服泄瀉止後調理以復脾胃之氣本方去乾薑神麯肉果加人參六分黃耆三分服二貼愈過服解表止瀉劑致損脾胃中血氣本方去肉果木香乾薑神麯黃連加山楂三分當歸四分半夏薑製八分麥門冬六分川芎二分此皆平和之劑故可常服調理以夏胃氣雖大人亦可服也磨積錠百八十二治小兒一切積滯白朮陳土炒二兩陳皮二兩厚朴姜炒一兩檳榔一兩枳實麩炒一兩三稜莪朮二味醋炒各一兩半甘草一兩使君子去核淨一兩七錢半夏曲一兩山楂去核神麯各二兩阿魏真者一兩黑牽牛頭末一兩半生半炒巴豆霜三錢另研木香三錢楂砂一錢洗去砂土蒼朮麩炒一兩上為末神麯一半麥芽面一半打糊為塊搗千餘下印作錠子每錠濕重二錢陰乾約一錢每服八歲以上一錠七歲以下半錠空心滾白湯磨下微利一二次不妨無積不可服惺惺散百八十三變蒸一症乃小兒蒸皮長骨變幻精神不須服藥其有兼傷風寒咳嗽痰涎鼻塞聲重蒸蒸發熱宜服此方人參白朮白茯苓甘草炙白芍藥炒桔梗天花粉各五錢細辛薄荷葉各二錢半上為粗末每服三錢水四盞煎二盞服不拘時候附治麻症及斑疹初因外感不解熱蘊於內而成宜用葛根湯以解散痘瘡初覺發熱亦宜用之若見標則不用也方見春類消毒飲百八十四治癍疹熱甚紫黑者或痘未出時亦宜服荊芥去根一錢連翹三錢牛蒡子一名鼠黏子炒研三錢防風去蘆甘草生各五分犀角二分另磨入上作一服水煎熱服附治痘三法按博愛心鑑治痘症立逆順險三法極其詳明而效驗亦神謹按其法之大概以所宜用之方隨變症加減詳於三法之下附順者一二日間初出之象如粟於口鼻腮耳年壽之間先發二三點淡紅潤色者吉之兆也氣得其正血得其行其毒淺而輕不得妄行所以不須服藥如七八日內貫漿之時略服保元湯一二貼以助其氣血也保元湯附人參二錢黃耆三錢甘草一錢加川芎五分當歸七分引助血分上用姜一片水一鍾煎六分食遠溫服附逆者初出於天庭司空太陽印堂結喉心胸方廣之處先發者逆形如蠶腫紫黑乾枯氣澀血滯致毒深妄參陽位難當其勢也以前保元湯內用人參一錢黃耆甘草各一錢加白芍藥一錢牛蒡子黃芩黃連玄參絲瓜灰當歸川芎連翹各五分陳皮官桂各三分防風羌活荊芥前胡各四分姜三片蔥一根煎服一以解毒一以助氣血取汗以泄其毒開其滯澀或幡然如雲霧之散而白日出見此一救而可得生者十中二三七八日內病勢沉重色白毒深又用保元湯加大黃芒硝枳實炒厚朴川芎當歸水煎服大下之下後而身濕再出紅潤此則十中可活一二乃起死回生之妙也附險者初出圓暈成形乾紅少潤其一二日出現者毒尚淺氣血未離可治以俟其氣血交會也以保元湯加桂二分兼和血勻氣之劑如毒若盛兼解毒之藥加味保元湯百八十五人參黃耆甘草白芍藥各一錢當歸六分活血陳皮六分勻氣白朮六分補中牛蒡子七分連翹玄參各六分解毒上用水一鍾煎七分溫服入少酒尤驗一云四肢出不快者加防風五分八九日以此方加減服以助其氣血貫漿十三四日內以保元湯加白朮白茯苓陳皮山楂以助結痂如渴用參苓白朮散方見夏類如毒熱不解用後方牛蒡子散附牛蒡子一錢連翹黃連玄參各七分甘草生荊芥防風各五分紫草五分犀角銼末三分入藥川芎當歸赤芍藥生地黃各六分上用水一鍾煎七分服以解其熱毒即安大法保元湯四物湯四君子湯皆當隨氣血盛衰參用毒盛則下之毒少則解散之寒則溫之熱則清之全在活法治之可保無虞古方木香異功等散多燥熱非真寒症不可輕用慎之慎之又方餘毒用牛蒡子射干升麻甘草各二錢水煎分上下服之驗過神功消毒保嬰丹百八十六凡小兒未出痘瘡者每遇春分秋分日服一丸其痘毒即漸消化若只服一二次者只得減少若服三年六次其毒盡能消化必保無虞此方屢經試驗務照後開日期潔誠修合服之神效纏豆藤一兩五錢其藤八月收取毛豆桔上纏繞細紅絲就是採取陰乾此味為主妙在此味藥上黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢五分生地黃五錢荊芥五錢防風五錢川獨活甘草當歸各五錢連翹七錢五分黃連赤芍藥桔梗各五錢牛蒡子一兩辰砂另研甘草同煮過去甘草一兩五錢苦絲瓜二個各長五寸隔年經霜者妙燒灰存性上各為極細末砂糖拌勻共搗千餘下丸如李核大每服一丸濃煎甘草湯化下其前項藥預辦精料遇春分秋分或正月十五或七月十五日修合務在虔誠治小兒初生七日內急患臍風撮口百無一活父母坐視其死而不能救良可憫哉一秘法極有神驗世罕知之凡兒患此疾者齒齦之上有小泡如粟米狀急以溫水蘸青軟中綿裹手指輕輕擦破即開口便安不須服藥神效不誤百八十七治撮口方附小兒斷臍為風濕所乘或尿在包裙之內遂成臍風面赤喘包啼聲不出名曰撮口此方治之蠍梢四尾姜蠶七枚瞿麥五分赤腳金頭蜈蚣一條上為細末先將鵝管吹藥一分入鼻內使嚏啼哭為可醫後用薄荷湯調服三五分立效附治小兒初生大小便不通腹脹欲絕者急令婦人以熱水漱口吸咂兒前後心並臍下兩手足共七處每一處凡三五次漱口吸咂取紅赤色為度須臾自通不爾無生若遇此症按法治之可得再生也天一丸百八十八治小兒百病隨症調引赤白茯苓茯神去皮心淨各三兩燈心用淨一斤以米粉漿水洗曬乾研末入水沉之浮者取用再曬乾二兩半沉者不用澤瀉五兩去毛淨要白者豬苓去黑皮五兩滑石牡丹皮二兩同煮半日去丹皮曬乾淨六兩上藥五味為細末外用人參六兩白朮六兩甘草四兩熬膏為丸如龍眼大硃砂為衣貼金箔每服一丸照病調引用大抵小兒之生本天一生水之妙凡治小兒病以水道通利為捷徑也養老類卻病延壽丹百八十九年高老人但覺小水短少即是病進宜服此方人參一錢白朮一錢牛膝一錢白芍藥一錢白茯苓一錢陳皮一錢山楂肉去核一錢當歸五分小甘草五分上用姜二片煎空心服春加川芎七分夏秋加黃芩麥門冬各一錢冬加乾薑二分倍當歸服至小水長止藥如短少又服此丹溪養母方也為人子者不可不知此或用糊丸如梧桐子大每服七八十丸空心食遠清米湯下三子養親湯百九十老人形衰苦於痰喘咳嗽氣急胸滿艱食不可妄投盪滌峻利之藥反耗真氣是有三人求治其親靜中精思以成此方隨試隨效又謂三子者出自老圃性度和平芬暢善佐飲食善脾胃使人親有勿藥之喜故仁者取焉紫蘇子主氣喘咳嗽用紫色真正年久者佳白芥子消痰下氣寬中白者佳紫色不用蘿蔔子主痞悶兼理氣用白種者上各洗淨去砂土曬乾紙上微炒研細看何經病多以所主為君餘次之每劑不過三錢用生絹或細布小袋盛之煮湯可隨甘旨飲啜亦不拘時勿煎太過令味苦辣口若大便素實入熟蜜一匙冬寒加姜一片尤妙加味地黃丸百九十一治老人陰虛筋骨痿弱無力面無光澤或黯慘食少痰多或嗽或喘或便溺數澀陽痿足膝無力形體瘦弱因腎氣久虛惟悴寢汗發熱作渴懷熟地黃酒蒸四兩山茱萸去核淨二兩山藥薑汁炒一兩牡丹皮去木一兩半五味子去梗一兩麥門冬去心一兩益智仁去殼鹽水炒一兩古方澤瀉上為末煉蜜為丸如梧桐子大每服七八十丸空心鹽湯下夏月不用鹽腰痛加鹿茸當歸木瓜續斷各一兩消渴去茯神倍用麥門冬五味子老人下元冷胞轉不得小便膨急切痛四五日困篤垂死者用澤瀉二兩去益智仁諸淋數起不通倍用茯苓澤瀉益智減半腳氣痛連腰胯加牛膝木瓜各兩夜多小便依本方茯苓減半虛壅於齒疼痛浮而不能嚼物並耳瞶及鳴並去麥門各加附子炮桂心淨各一兩耳聾或作波濤鐘鼓之聲用全蠍四十九枚炒微黃色為末每服三錢溫酒送下一百丸空心服加味搜風順氣丸百九十二老人常服潤利臟腑永無癱瘓痰火之病極效方見冬類固本酒百九十三老人常服補脾清肺養心益腎大補陰血人參一兩甘州枸杞子一兩天門冬去心一兩麥門冬去心一兩懷生地黃一兩懷熟地黃一兩上好燒酒十二斤浸春秋半月夏七冬二十一日密封固瓶口待浸日完取出絞去渣每日空心食遠各飲二盞其渣再用白酒十斤煮熟去渣每日隨意用之菖蒲酒附通血脈調榮衛聰耳明目久服氣力倍常行及奔馬發白返黑齒落更生延年益壽心與神通晝夜有光用五月五日六月六日七月七日取菖蒲不拘多少搗爛絞取清汁五斗糯米五斗蒸熟入細酒面五斤南方只用三斤搗碎拌勻如造酒法下缸密蓋三七日榨起新罐盛泥封固每次溫服二三杯極妙菊花酒附清心明目養血疏風家菊花五斤生地黃懷慶者五斤地骨皮去土木淨五斤上三味搗碎一處用水一石煮取淨汁五斗次用糯米五斗炊飯細面曲五斤拌令勻入甕內密封三七日候熟澄清去渣另用小瓶盛貯每服二三杯不拘時候冬青子酒附用冬至日採冬青子一斗五升糯米三斗拌勻蒸熟以酒麴造成酒去渣煮熟隨意飲五七杯不拘時能清心明目烏須黑髮延年益壽卻百病消痰火紫蘇子酒附調中益五臟下氣補虛潤心肺消痰順氣用紫蘇子三升炒香研細清酒三斗罐貯將蘇子納入酒中密封浸一七濾去渣每日隨飲三五杯豬腰子粥百九十四治老人腎臟氣憊耳聾豬腰子二對約八兩蔥白四莖去須切碎人參五分防風五分粳米八合薤白少許上五味和米煮粥入鹽空心食之黃雞粥附治老人五勞七傷益下元壯氣海服經月餘肌肉充盛不論男婦老少皆宜用之大有補益黃母雞一隻初生一次蛋者佳殺去毛腸雜肉蓯蓉酒浸一宿去皺皮並內白心切片曬乾一兩生薯蕷一兩阿魏少許粳米三合上先將雞煮爛去筋骨取汁下米及雞肉並蓯蓉等五樣煮熟下鹽空心食之羊肉粥附治老人虛損羸瘦助陽壯筋骨羊肉二斤去骨人參一兩去蘆黃耆一兩生用白茯苓去皮一兩大棗去核五枚糯米三合上先將羊肉去脂皮取精肉四兩細切豆大餘一斤十二兩並藥四味用水五大碗煎取汁三碗絞去渣入米煮粥再下前切細生羊肉同煮熟入五味調和空心食之羊脊髓粥附治老人脾胃氣弱勞損不下食用大羊脊髓一條透肥者搗碎用青梁米四合淘淨以水五升煮取汁二升下米煮作粥入五味和勻空心食之常用極有補益雞頭實粥附老人常用益精強腎聰耳明目用蓮肉三兩去皮心淨糯米三合晚米三合和勻作二次煮粥空心食之法制豬肚方百九十五補老人脾胃不足虛羸乏力用雞頭實不拘多少去殼淨粉三合粳米三合照常煮粥空心食之薏苡仁粥附治老人脾胃虛弱常用疏風濕壯筋骨甩薏苡仁四兩粳米三合照常煮粥不拘時用蓮肉粥附老人常用補脾胃養心腎豶豬肚一具洗淨人參五錢乾薑一錢泡蔥白五莖去須葉川椒一錢炒出汗去目閉口者糯米五合上藥研為末以米合和相得入豬肚內縫合勿令泄氣以水五升用砂鍋內慢火煮令極爛空心服之次飲酒三五杯牛髓膏附用熟牛胻骨內髓四兩核桃仁去皮二兩上二味和搗成膏空心食入少鹽大能補腎消痰極效開胃炒麵方附歌曰二兩白鹽四兩姜五斤炒麵二茴香半斤杏仁和麵炒一兩甘草蜜炙黃枸杞胡桃各半斤芝麻等分最為良駐顏和血延壽算補藥之中第一方上各研末和勻不拘時白滾湯點服又方附治老人脾虛或大病後胃口虛弱怯食用糯米五升浸一晝夜用時淋干入鍋內慢火炒令香燥不可焦外用花椒炒出汗去目及閉口者淨二兩薏苡仁一斤蓮肉一斤去皮心各炒黃熟共和為末再用白糖二斤和勻磁罐密貯每日清晨用一白盞沸湯調服善能補胃進食
