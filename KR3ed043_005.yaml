body:
  text: 卷五禁方萬靈膏百九十六香油四斤槐柳桃榴椿杏楮各二枝兩尖白芷赤芍藥大黃人參黃連白芍藥草烏苦參川芎生地黃川椒胎髮川山甲熟地黃槐子杏仁各一兩當歸二兩萆麻一百二十去皮巴豆一百一十去皮黃柏一兩去皮木鱉五十個去皮上兩尖等二十二味俱㕮咀如麻豆大入香油內浸春五夏三秋七冬十日黃香十二兩黃丹二斤水飛澄火焙七次阿魏沉香丁香麝香血竭各一兩乳香沒藥各三兩上阿魏等八味俱為細末先將香油並藥入銅鍋內熬焦將藥鍋取溫冷用生絹過淨將藥再熬下黃丹用槐柳等枝不住手攪此時用燒火宜慢常滴藥在水中成珠不散入黃香將鍋取下冷片時減火性乃下阿魏等八味攪均用涼水一大桶將藥拔下水中一日換水一次浸七日七夜去火力用時以滾水化開量疾大小裁榜綿紙貼效如神無德之人不可傳歌曰此方妙訣祕通仙原自從師學道傳萬病無憂皆有效命歸地府得復全歌曰內外俱醫識認真不憑診脈問原因熬成神應攤貼上一服時間利患身治法癰瘡初出疽瘡初出發背初出疔瘡初出瘰癘初出無名腫毒初出以上諸證初發一二日未成大患俱用此膏貼之火烘雙手尉一百五十餘手務要出汗其瘡即日消散若瘡出四五日已成腫硬內已有膿亦用此膏貼之拔出膿淨其瘡自然生肌平滿乾溼疥癬諸般瘙癢諸般風疹以上諸證俱用此膏貼於臍中火烘雙手尉一百餘手出汗癩瘡腫膚此證用膏貼之內加搗細木鱉一個貼臍中火烘雙手尉一百餘手出汗切小瘡癤用此膏隨瘡大小貼用之胱膀腫硬用膏貼之火烘雙手尉五十餘手肩背寒濕疼痛腰腿寒濕疼痛兩腳寒濕疼痛腳氣穿心疼痛以上諸症俱用此膏貼之火烘雙手尉一百餘手男子腸痿不起女人陰痿瘦弱男子遺精白濁女人赤白帶下男子元氣虛冷女人子宮冷閉男婦赤白痢疾以上諸證俱用此膏內加搗細木鱉一個貼丹田火烘雙手尉一百餘五癆七傷此證男女俱貼肺腧肩井三里曲池火烘雙手尉一百餘手男女痞塊此證用曲作圈圍痞處內放皮硝一兩上用重紙蓋尉斗尉紙上令內熱去其硝面用此膏內加搗細木鱉一個貼之火烘雙手尉一百餘手出汗小男癖疾此證不用硝面止用此膏貼之火烘雙手尉二三十次覺腹內熱即止左癱右瘓此證用此膏內加搗細木鱉一個貼丹田火烘雙手尉一百餘手患處仍服此藥三丸好酒下偏正頭疼此一證男女俱貼臍內火烘雙手尉八十餘手冷積攻心照依積症大小攤貼火烘雙手尉六十餘手舌脹此證用此膏貼心中肺腧並心坎下三寸火烘雙手尉一百餘手出汗酒積酒後嘔吐轉食暗風以上諸症俱用此膏貼肺腧兼心坎下二寸許火烘雙手尉六十餘手風寒咳嗽風熱咳嗽癆病咳嗽以上諸症用此膏貼肺腧火烘雙手尉六十餘手出汗打撲血凝此症用此膏貼疼處如打撲虛腫火烘雙手尉一十餘手覺熱即止胸膈不利氣喘不止此二症俱用此膏貼肺腧火烘雙手尉一百餘手安胎不定此症先用此膏臍內貼後用此膏內加搗細木鱉一個貼丹田火烘雙手尉一百餘手月經不通此症用此膏貼陶康二穴骨上火烘雙手尉六十餘手犬咬蛇傷蠍螯此症用此膏貼之不許用手烘若用手烘作膿難好春三月傷寒已過日期用此膏貼臍上心坎下火烘雙手尉八十餘手春三月傷寒未過日期用此膏二兩半貼臍中火烘雙手尉六十餘手出汗夏三月傷寒走黃結胸用此膏二兩貼心坎下火烘雙手尉八十餘手秋三月傷寒兼赤白痢用此膏二兩貼臍中火烘雙手尉九十餘手冬三月傷寒兼赤白痢用此膏二兩半貼臍中火烘雙手尉一百餘手四季傷寒俱貼臍中酉時分貼一服時見效服用將前膏藥為丸如梧桐子大蛤粉為衣其藥可放十年不壞愈久愈效每服三丸各隨症引下發背瘡冷水下血氣未通酒下咳嗽綿裹噙化纏喉風綿裹噙化喉閉綿裹噙化風赤眼山梔湯下打撲傷損橘皮湯下腰膝疼痛鹽湯下唾血桑白皮湯下赤痢甘草湯下白痢生薑湯下産後諸疾當歸湯下赤白帶下當歸湯下詩曰常服肺涼諸病疴宿垢留腸用此觸軟積開痰消癖瘕大除胃熱保神全四時無病常服照各飲下春養肝臟芎藭黃耆湯下夏養心臟附子茯苓湯下秋養肺臟赤小豆桔梗湯下冬養腎臟蓯蓉茯苓湯下四季養脾臟四引春季芍藥湯下夏季黃芩湯下秋季茯苓湯下冬季烏頭湯下眼目雜症十一引眼盲暗密蒙花湯下五輪眼疳菊花湯下內障眼疾石決明湯下雲翳遮睛木瓜湯下攀睛翳膜石決明湯下眼目咽喉病淡滾湯下雀目眼疾夜明砂仁湯下兩眼赤腫痛陳皮湯下赤熱火眼黃連湯下羞明怕日荊芥湯下七十二種雜患眼椒湯下風疾病症二十六引頭眩目暈防風湯下搖頭風金線重樓湯下口眼歪邪語言不正酒下左癱右瘓熱黃酒下風狂麝香硃砂湯下頭風手足腰曲荊芥湯下暗風病症荊芥湯下感風百節痛獨活湯下偏正頭風清茶湯下風濕痹病天門冬湯下諸痹骨痛六一散下風寒病症菖蒲湯下風氣病茱萸湯下驚癇風杏仁湯下中諸風桃仁湯下管仲湯亦可諸風疾荊芥湯下乾薑亦可風狂癇病空心酒下苦丁香亦可破傷風病黃蠟湯下心急風硃砂防風湯下患後得風熱酒下膀胱腎氣茴香湯下淋漓牛蒡子通草湯下腸風瀉血當歸炒槐子湯下病風蓯蓉湯下腸風痔漏柯子湯下骨節拘急率風寒濕癖症白蒿荊芥湯下傷寒病症六引傷寒無汗麻黃柴胡湯下傷寒有汗桂枝芍藥湯下時氣瘟疫井花水下麻子仁亦可陽毒傷寒黃連梔子湯下或痢發汗生薑蔥白湯下陰毒傷寒附子棗湯下酒亦可一應寒熱五般瘧疾十四引暑氣熱病六一散調下寒冷病症乳汁同煎下大瘟疫熱病黃芩湯下渾身壯熱砂糖湯下虛熱竹葉柴胡湯下熱病知母湯下上焦熱大