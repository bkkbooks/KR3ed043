一面搗一面慢慢加入松脂搗五六千下看軟硬得宜為圓硬則少少加酒再搗軟則擦和為圓凡為圓如梧桐子大每早空心服二錢飲酒者酒送下不飲者米湯鹽湯送下漸漸加入一分加至二錢五分止加味滋陰大補丸二百五主養血養氣滋腎水固元陽添精髓壯腰膝潤膚體育心神久服多子駐顏延年甘州枸杞子擇去枝蒂酒拌蒸四兩沙苑蒺藜酒洗蜜酒拌蒸三兩當歸身酒洗二兩人參去蘆一兩黃耆蜜炙二兩山藥人乳拌曬三次二兩山茱萸水洗去核童便拌曬二兩白茯苓去皮漂去筋膜人乳拌曬三次二兩牡丹皮酒洗去心二兩懷生地黃酒洗二兩懷熟地黃酒洗二兩天門冬水洗去心二兩麥門冬水洗去心二兩黃柏川秋石入酒炒褐色一兩五錢知母川秋石入酒炒褐色一兩五錢龜板酒洗酥炙二兩杜仲去粗皮薑汁炒斷絲二兩牛膝去蘆酒洗同黑豆蒸二時去豆二兩補骨脂酒浸蒸二兩鹿角膠四兩菟絲子水淘去沙酒浸蒸搗成餅焙乾二兩肉蓯蓉酒洗酥炙一兩五錢瑣陽酒浸酥炙一兩二錢虎脛骨酒浸酥炙二兩上各為細末先以丸角膠用無灰好酒熔開和煉蜜丸如梧桐子大每服三錢空腹微鹽湯送下溫酒亦可參朮啓脾丸二百六主補脾胃益元氣壯精神化痰涎靈飲食久服肥健延年人參去蘆二兩白朮麩皮炒四兩黃耆蜜炙二兩白茯苓去皮二兩山藥微炒二兩甘草炙五錢陳皮去半白一兩黃連炒八錢法制半夏粉一兩砂仁一兩神麯炒五錢白芍藥炒一兩五錢山楂肉一兩藿香水洗三錢麥門冬炒取末五錢上各為細末煉蜜為丸如梧桐子大每服二錢白湯下空腹食遠皆可服以上二方寧波府鄞縣醫生錢雷送呈固齒烏須補腎兼治牙疼方二百七當歸一兩酒浸洗川芎一兩水泡洗熟地黃一兩酒浸洗白芍藥一兩紙包煨川牛膝一兩去蘆酒洗甘枸杞一兩香附子一兩五錢鹽水浸透荊芥穗八錢洗淨雪白石膏一兩五錢青鹽一兩上十味共為細末用磁罐或鉛盒收貯每早鴛鴦手擦牙久漱藥水或吐或咽到老不疼不落甚妙又治牙疼煎藥方附羌活獨活柴胡桔梗甘草川芎細辛石膏大黃煨赤茯苓黃芩酒炒山梔子炒黃柏炒黃連酒炒連翹升麻前胡上十七味等分每劑用生薑一片燈心十餘根水一鍾半煎七分食遠溫服羊肝餅二百八專治小兒驚積左脅下有塊女人血瘕發熱瘦弱若積塊在右為食積宜貼阿魏膏不宜吃此餅黑羯羊肝一具去筋膜切成方寸塊中間割開相連白朮一兩小米泔浸一宿切成咀陳壁土炒黃色為細末一兩左顧大牡蠣一個重一斤者炭火煅通紅候冷為細末一兩真黃蠟一兩溶化開入前藥二味攪勻乘熱成餅照肝塊數目如肝塊大其餅重二錢小者重一錢五分上將蠟餅夾於肝內用竹葉包裹以線縛之入新沙鍋中以水淹一寸入粟米五六合煮以米熟為度候冷去竹葉任小兒食之一頒二三塊夏月將餅繫於井中勿令色變味臭小兒不肯食也重者不過一肝二肝輕者數塊則熱止七日後則積消腹軟矣治天泡瘡二百九用小紅棗一枚入砒一錢燒胡為末入水花朱三分初發井花水調敷破者乾摻掩者揭蓋點入神效治眼方二百一十迎風流淚一切患眼疾無不效者黃連三兩黃芩二兩黃柏上用水一碗浸二宿將好蘆甘石六兩炭火燒紅淬水九次埋土五七次取起研淨末二兩用珍珠硃砂瑪瑙海漂硝各五分冰片麝香各二分朴硝一分細研點眼精妙入神洗點眼附用黃連防風等分濃煎取膏再入芒硝白礬等分澄清去汁仗者點眼妙洗眼神效附五月五日午時取銀杏葉陰乾每用十片將無根水一鍾煎至八分淨器收起值日洗面後即溫此水洗目不致間斷洗及一年盲者復明洗目日期正月初八二月初十三月初五四月初一五月初五六月初七七月初八八月初八九月初十十月初十十一月初九十二月二十一閏月如前月日期法制陳皮二百一十二如陳皮四兩去白用人參一兩青鹽五錢柿箱二錢甘草二錢烏梅二錢一方用滑石一兩除陳皮余藥水煎去渣取汁浸皮其渣再煎取汁浸盡焙乾用又方附能解氣寬郁止嗽如廣陳皮一斤潤去白用甘草四兩烏梅肉四兩青鹽四兩如咳嗽用訶子一兩上藥用水四碗煎至三碗澄清曬乾清晨用消毒方二百一十二番木鱉一錢油炒乳香七分炙去油木香七分麝香五釐川山甲一錢炙蘇上藥共研細末或為丸壯年者二次服寡弱者作三次服敷腫毒方附無殼蜒蝣萬年灰鮮魚共搗爛塗患處即愈治寒溫等瘡二百一十三飛丹四錢黃連五錢蒼朮五錢松香五錢兒茶一錢輕粉五分上為極細末用生蔥頭十根搗爛加香油調如膏用梓樹葉攤以隔葉貼一二日再換如痛者加乳香沒藥各五分先用桑葉蔥頭煎湯候溫洗淨貼膏滸堂跌閃損折藥方二百一十四乳香沒藥各一錢大黃二錢巴豆肥人二粒半瘦人一粒半上為細末或煉蜜為丸或末調服服時用姜三片桃仁十粒去皮尖蔥白連須三根共搗碎入好酒一鍾和勻去渣待五更熱酒調服前藥再用好酒儘量飲之或見血片或見黑水為效即以紅米溫粥止之又方下瘀血附歸梢川芎赤芍烏藥蒼朮青皮陳皮枳殼紅木紅花桃仁肉桂大黃水二鍾煎八分空心服渣再煎跌損方附用猴姜為末和老米飯搗爛罨患處清金益壽丹二百一十五貝母二兩大者以水洗淨去心五味子五錢用北新鮮者玄參三兩用堅實去梢水洗淨風乾為細末桔梗一兩用米泔洗去頭梢風乾丹參二兩去根梢忌鐵器杵為末柏子仁五錢以井水浸去油再以水淨之麥門冬四兩大者洗淨去心風乾白茯苓二兩云間白者以人乳浸風乾硃砂一錢五分蒲黃一兩以五錢生用以五錢用新瓦微炒上為末留柏子仁隨末同研煉蜜丸如龍眼大以金箔為衣五更時噙一丸或午後夜飯後亦可雞蘇餅二百一十六清上焦潤咽膈生津液化痰降火止嗽能醒酒解酒毒雞蘇薄荷淨葉三兩紫蘇葉五錢白葛粉一兩烏梅肉二兩五錢另研如泥檀香二錢硼砂五錢柿霜四兩白冰糖八兩上為極細末入片腦一分五釐再研和勻入煉蜜得中印成櫻桃大餅子每服一丸噙化不拘時治産後心風二百一十七為之神不守舍發顛狂者甘遂三錢硃砂二錢豬心血為丸金箔為衣老酒下産後惡露不通幾死者急用家下灶內鍋臍黑霜刮來熱酒吞下如無好酒短水白酒亦可一炷香時即下忌口要緊附産後尿胞墜落者用松脂一斤搗碎好酒四碗煎作二碗作三四次服即愈附治痢二百一十八用木香黃連等分為末蜜丸如梧桐子以陳米湯空心肚服二三十丸日再服極效久痢不愈附用廣木香方圓一寸川黃連五錢銼碎用水一鍾半入前藥煎至水乾去黃連碎銼焙乾為末分作三服一服陳皮湯下次服陳米湯下三服甘草湯下全愈又方附用生薑一兩細切如麻豆好茶一兩以水三碗煎至二碗聽服之極效血痢附用好乾姜燒烏為末每服一錢米飲下治遍身瘋痛二百一十九用白鳳仙花樹煎湯湯內加老酒一二鏇用湯多浴汗出即愈治遍身走瘋附光烏三錢炒白芷一錢五分炒香附一錢五分炒獨活一錢五分上為細末臨臥時溫酒調下前藥末每用五分門口勿令泄氣藥盡則愈治痘毒二百二十用生白果搗爛不拘多寡加黃丹一二錢罨之即愈治痞積二百二十一矮牛膝根二兩蝦蟆酸草一兩沉大麥一兩炒焦黃色加酒藥五錢同炒用好生酒二碗煎將好再加大酒二碗共煎成二碗將雄黃末一錢入藥服渣再服加好酒三碗治便毒二百二十二用槐米炒黃為末雞蛋清調敷即以管仲二兩銼青鹽一錢二分好水酒煎空肚服便毒不收口附用烏魚尾貼之日換二次即愈治瘧症二百二十三若日日來者用膠棗一枚去核入萆麻子仁三粒清心溫酒嚼下如間日者加麻仁二粒如三四日者如例加之為妙小便不通諸藥不效悶亂欲死者急以甘遂五錢為細末用涼水調如膏敷臍下丹田穴再以甘草節五錢煎湯垂服汁至臍下即通矣此急救之良訣也二百二十四治牛中暑二百二十五用胡麻苗搗汁灌之即愈無苗即用麻子三四兩搗爛和井水調勻灌之史國公百病無憂藥酒專治風痰半身偏枯手足拘攣不堪行步若飲一升手能梳頭服二升足能屈伸有力服三升語言舒暢行步如故服四升肢體通暖百節遂和舉步如飛其效如神防風二兩去蘆秦艽二兩當歸三兩萆薢三兩羌活三兩鱉甲二兩酥炙川牛膝二兩去蘆虎脛骨二兩酥炙白朮二兩油松節二兩捶碎杜仲三兩薑汁拌炒去絲晚蠶沙三兩炒黃色蒼耳子四兩捶碎干茄根八兩飯上蒸枸杞子五兩炒或用加烏頭尤妙上㕮咀布袋盛貯用好酒三十五斤以壇裝將藥入壇內浸之密封壇浸十四日入水鍋煮熟入土埋三日夜去火每清晨午後各服五七鍾大有補益老年染患尤宜
