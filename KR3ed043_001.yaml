body:
  text: 卷一飲食論人知飲食所以養生不知飲食失調亦能害生故能消息使適其宜是賢哲防於未病凡以飲食無論四時常欲溫暖夏月伏陰在內暖食尤宜不欲苦飽飽則筋脈橫解陽癖為痔因而大飲則氣乃大逆養生之道不宜食後便臥及終日穩坐皆能從凝結氣血久則損壽食後常以手摩腹數百遍仰面呵氣數百口超趄緩行數百步謂之消食後便臥令人患肺氣頭風中痞之疾蓋榮衛不通氣血凝滯故爾是以食訖常行步躊躇有作修為乃佳語曰流水不腐戶樞不蠹以其動也食飽不得速步走馬登高涉險恐氣滿而激致傷臟肺不宜夜食蓋脾好音聲聞聲即動而磨食日入之後萬響都絕脾乃不磨食食即不易消不消即損胃損胃即不受穀氣穀氣不受即多吐多吐即為翻胃之疾矣食欲少而數不欲頓而多常欲飽中飢飢中飽為善爾食熱物後不宜再食冷物食冷物後不宜再食熱物冷熱相激必患牙疼瓜果不時禽獸自死及生鮓煎煿之物油膩難消粉粥冷淘之類皆不宜食五味入口不欲偏多多則隨其臟腑各有所損故咸多傷心甘多傷腎辛多傷肝苦多傷肺酸多傷脾內經曰多食酸則脈凝澀而變色多食苦則皮槁毛拔多食辛則筋急而爪枯多食酸則肉胝皺而唇揭多食甘則骨肉痛而發落偏之為害如此故上士澹泊其次中和此飲食之大節也酒飲少則益多則損惟氣暢而止可也飲少則能引滯氣導藥力調肌膚益顏色通榮衛闢穢惡過多而醉則肝浮膽橫諸脈衛激由之敗腎毀筋腐骨傷胃久之神散魄消不能飲食獨與酒宜去死無日矣飽食之後尤宜忌之飲覺過多吐之為妙飲酒後不可飲冷水冷茶被酒引入腎中停為冷毒久必腰膝沉重膀胱冷痛水腫消濁攣躄之疾作矣酒後不得風中坐臥袒肉操扇此時毛孔盡開風邪易入感之令人四肢不遂不欲極飢而食飢食不可過飽不欲極渴而飲渴飲不可過多食過多則結積飲過多則成痰癖故曰大渴勿大飲大飢勿大食恐血氣失常卒然不救也嗟乎善養生者養內不善養生者養外養內者恬澹臟肺調順血氣使一身之氣流行沖和百病不作養外者恣口腹之慾極滋味之美雖肌體充腴容色悅澤而酷烈之氣內蝕臟腑精神虛矣安能保合太和以臻遐齡莊子曰人之可畏者衽席飲食之間而不知為之節誠過也其此之謂乎男女論天地氤氳萬物化醇男女媾精萬物化生此造化之本源性命之根柢也故人之大欲亦莫切於此嗜而不知禁則侵克年齡吞食精魄喑然不覺而元神真氣去矣豈不大可哀哉或問抱朴子曰傷生者豈非色欲之間乎曰然長生之要其在房中上士知之可以延年祛病其次不以自伐下愚縱欲損壽而已是以古人知此恆有節度二十以前一日復二十以後三日復三十以後十日復四十以後一月復五十以後三月復六十以後七月復又曰六十閉戶蓋時加撙節保惜真元以為身之主命不然雖勤於吐納導引藥餌之術而根本不固亦終無益內經曰能知七損八益七者女子之血八者男子之精也則血氣精氣二者可調不知用此則早衰之漸也故年四十而陰氣自半起居衰矣五十體重耳目不聰明矣六十氣血大衰九竅不利故曰知之則強不知則否智者有餘自性而先行愚者不足察行而後學固能老而壯壯而治而壽命可保矣補陰丸一丹溪謂人陽常有餘陰常不足宜常補其陰使陰與陽齊則水升火降人惟以腎氣為本故此方專滋補腎水此丹溪前賢之法天也黃柏去皮鹽酒炒知母去皮鹽酒炒龜板去弦酥炙各二兩淨熟地黃酒蒸九次曬乾五兩瑣陽酥炙二兩北五味子去梗一兩甘州枸杞子去梗三兩白芍藥酒炒天門冬去心各二兩乾薑炒紫色三錢冬月五錢上為細末煉蜜為丸如梧桐子大每服八九十丸空心炒鹽湯送下冬月溫酒不飲酒者清米湯下理脾胃加山藥白朮白茯苓各二兩陳皮一兩固精加牡蠣煅童便淬七錢山茱萸肉二兩白朮七錢壯暖臍腰膝加虎脛骨酥炙漢防己酒洗牛膝去蘆酒洗各一兩枳朮丸二內經以脾土旺能生萬物此東垣前賢以胃氣之法地故用此方一補一消制其太過補其不足也枳實一兩去穰麩炒白朮二兩陳壁土炒上為末荷葉濃煎汁打老米粉糊為丸用白湯下七十丸不拘時服閩廣吳浙濕熱地方加山楂肉神麯黃芩黃連蒼朮各一兩有痰加半夏陳皮去白南星各一兩有郁加撫芎香附山梔各一兩有熱加黃芩黃連當歸地骨皮酒炒大黃各五錢蒼朮丸三一名鉛汞丸一名秋石丸此藥一十三味其效全在一製法也淨室中沐浴修合務得其法服此專調不足之氣血諸虛百損遍身痰凝氣滯風濕麻痹眼目昏花腰疼頭暈手足欠順行履難辛遺泄真精便濁不利及婦人胎前產後赤白淋澀服之並宜此藥清而不寒溫而不燥功不可盡述寶之蒼朮茅山者佳用一斤半製為末取細膏四兩入藥此藥其性燥而辛烈去內外之濕熱引經藥也行於表裡製為膏者所以變其質猶伊尹放太甲於桐俾為善以成濟世之功也製法用糯米泔浸一日半撈起刮去粗皮見白曬乾又用童便浸一日半撈起清水洗淨曬乾又用煮酒浸一日半撈起曬乾仍用糯米泔澄清煮蒼朮以爛為度然後於陳米蒸飯蓋之用一層飯一層術上以荷葉蓋飯不泄穀氣為妙去飯葉曬乾為末黃柏八兩製為末六兩入藥此藥其性雖寒非芩連之苦此能通腎氣而瀉膀胱之火火動則水不寧用此者所以瀉火而寧腎水也製法刮去粗皮銼碎用無灰好酒浸三日夜翻覆浸透曬乾用蜜拌黃柏於砂鍋內著水半鍋以柳條札稜起水面上鋪荷葉攤黃柏於葉蒸之以蜜浸進為度取出曬乾如此拌蒸三次後用紙鋪鍋底隔紙炒茶褐色為度為細末知母製為末六兩入藥此藥其性潤而不寒虛弱之人火易動而水常涸所以用此味專補腎水蓋為能制火之故也製法銼碎用好酒浸三日曬乾隔紙炒焙為末枳實四兩製為末入藥虛弱之人火最易動津液受克而為痰或膏粱味厚而為痰蓋半夏化痰其性燥烈服之反渴渴增則貪飲愈飲愈濕受火邪而痰愈結也貝母去四種痰然能表而不能里南星雖去痰然能上而不能下因於風者可用惟枳實之功不可勝計製法銼碎與麩皮同炒茶褐色為度去麩不用為細末白朮製為末四兩入藥此藥大能補脾虛弱之人胃火必勝而食易消愈消而愈食則脾豈有不損乎脾損則食不能克化而用消導之劑則反傷脾胃脾胃受傷是無本矣豈能安乎然必用此以補脾猶修武備而禦寇也製法砂鍋內隔紙以麩皮拌炒須不住手攪以聞藥味香無面氣為度去麩不用為細末當歸製為末五兩入藥此藥其性溫治四等血病流者能止凝者能行虛者能補亂者能和虛弱之人火旺水衰血必受傷或流或止或凝或行故必用此以和之製法用酒洗淨再用好酒浸一日半曬乾為細末熟地黃製為末五兩入藥虛弱之人諸血最虛皆由心之耗而肝之枯也是以四肢懈怠足不能履手不能持耳不能聽目不能視腸不能通而多結也故必用此以補一身之血製法用好酒洗淨再用酒浸曬乾為細末入藥乾山藥製為末四兩入藥此藥其性溫平主益中補虛除寒熱邪氣益氣力長肌肉治頑風止腰疼寧心肺潤皮毛治泄精健忘白茯苓製為末三兩入藥此藥其性去濕利小便潤胃氣伐腎邪瀉痰火久服安魂養神延年益壽而無消渴之患製法刮去粗皮銼碎曬乾麩皮拌於鍋內隔紙炒以茶褐色為度去麩為細末防風製為末三兩入藥虛弱之人血損少則湊理不密而風邪易入必用此所以驅邪之物防風之性威而不猛也製法去蘆銼碎隔紙炒乾為末靈砂五錢為末入藥虛弱之人心虛血少必多驚悸而夢寐不寧故用此以鎮之以水銀飛二次者靈砂也經云靈砂人服之養精神安魂魄益氣明目駐顏色真鉛其鉛乃取室女天真未行欲心未動而自然來者得純陰之正移陰補陽自然之理其功效不可勝言此物倘然不可得當取陰分之上其功亦不減於真鉛也用年少婦人乳三碗蓋乳者血之化也陰分之上則為乳陰分之下則為血所以用此者以血補血也虛弱之人身血必衰以此補之所謂布衣破而以布補之意也用法將面量入乳中打糊丸藥真汞即秋石也研末四兩入藥此藥其性咸能入腎而用童便煎者蓋因元氣之未泄而純陽之未喪煅煉而成亦真元氣也虛弱之人精神必損故必用此藥以補之上將前藥各另為極細末總合拌勻仍用重羅羅過以前乳糊為丸如梧桐子大曬乾收入磁瓶內盛放每服五六十丸或七八十丸清辰鹽湯送下臨臥遠志湯送下補天大造丸四專培養元氣延年益嗣壯陽光溫坎水降離火為天地交泰若虛勞房室過度之人五心煩熱服之神效平常之人四十以後尤宜常服接補真元以躋上壽紫河車一具取首生男胎者佳如無得壯盛婦人者亦好先用鮮米泔將河車輕輕擺開換洗米泔五次不動筋膜此乃初結之真氣也只洗淨有草屑輕手取去將竹器盛於長流水中浸一刻以取生氣提回以小無盆盛於木甑內蒸自卯辰蒸起至申酉時止用文武火緩緩蒸之極爛如糊取出先傾自然汁在藥末內略和勻此天元正氣汁也河車放石臼內杵擂一千下如糊樣通前藥汁末同和勻搗千餘杵集眾手為丸此全天元真氣以人補人最妙世所少知醫用火焙酒煮又去筋膜大誤又入龜板尤誤故特表而出之厚川黃柏去粗皮酒炒一兩川杜仲去粗皮酥炙斷絲一兩五錢川牛膝酒浸去蘆一兩五錢當歸身酒浸一兩淮熟地黃酒蒸九次忌鐵二兩天門冬去皮心一兩半淮生地黃酒浸一兩半枸杞去梗一兩麥門冬去心一兩五錢以上四味另用酒煮爛搗膏陳皮去白淨七錢半白朮去蘆妙一兩五味子去梗七錢小茴香炒七錢乾薑泡黑二錢側柏葉採取嫩枝隔紙炒乾二兩骨熱加牡丹皮去心地骨皮去心知母去皮各一兩酒炒血虛加當歸地黃加倍氣虛加人參黃耆蜜炙各一兩婦人去黃柏加川芎香附細實條芩俱酒炒各一兩上藥各擇精製各秤淨為末不犯鐵器用前蒸熟河車搗爛並汁和為丸若河車肥大量加些藥末不必用蜜丸如梧桐子大每服百丸空心米湯下有病一日二服按此方比古用之更效若稟氣虛或斫喪太過太早者尤宜用之四物湯五治男婦血虛諸症為婦人之總藥川芎當歸白芍藥熟地黃各等分上用姜一片水煎服兼有他症照古法加減用四君子湯六治男婦氣虛脾胃諸症人參一錢五分白朮三錢白茯苓二錢甘草一錢上用薑棗煎食遠服兼有他症照古法加減用八物湯七氣血虛弱即前二方合用兼症亦照古法加減用十全大補湯八治男婦諸虛不足五勞七傷生血氣補脾胃即前八物湯一兩如黃耆一錢二分肉桂八分薑棗煎服補中益氣湯九治勞倦傷脾喜怒憂恐耗損元氣榮衛不調乃生寒熱皆脾胃之氣不足此方主之黃耆一錢五分人參一錢三分甘草七分以上三味除濕熱煩熱之聖藥也白朮一錢當歸身一錢陳皮七分升麻柴胡各五分上用姜一片棗一枚煎服兼症照東垣法加減用人參飲十人遇勞倦辛苦過多即服此方免生內傷發熱之病主於補氣黃耆蜜炙錢半人參一錢半甘草炙七分陳皮去白一錢白朮一錢二分五味子二十粒打碎麥門冬去心一錢上用生薑二片大棗二枚水一鍾半煎八分食前服勞倦甚加熟附子四分當歸飲十一人遇勞心思慮損傷精神頭眩目昏心虛氣短驚悸煩熱即服此方補血為主人參一錢五分當歸身一錢五分麥門冬一錢五味子十五粒白芍藥酒炒一錢山梔五分白茯神去皮心一錢酸棗仁炒一錢生地黃薑汁洗五分甘草炙五分陳皮五分川芎五分上用姜二片大棗一枚水一鍾半煎八分食遠服補陰散即滋陰降火湯十二治陰虛火動盜汗發熱咳嗽吐血身熱脈數肌肉消瘦少年中年酒色過傷成癆者服之極效川芎一錢當歸一錢三分白芍藥一錢二分黃柏七分蜜水浸火炙天門冬一錢去皮心白朮炒一錢二分陳皮去白七分乾薑炒紫色三分知母一錢蜜水拌炒生地黃五分酒洗甘草炙五分乾薑炒紫色三分知母一錢蜜水拌炒生地黃五分酒洗甘草炙五分熟地黃一錢上用生薑三片水一鍾半煎八分空心服加減於後咳嗽盛加桑白皮蜜炒馬兜苓各七分五味子十粒痰盛加半夏薑製貝母栝蔞仁各一錢盜汗多加牡蠣酸棗仁各七分浮小麥一錢潮熱盛加沙參桑白皮地骨皮各七分夢泄遺精加龍骨牡蠣山茱萸各七分赤白濁加白茯苓一錢黃連三分衄血咳血出於肺也加白皮一錢黃芩山梔各五分炒涎血痰血出於脾也加桑白皮貝母黃連栝蔞仁各七分嘔血吐血出於胃也加山梔仁炒黃連乾葛蒲黃炒各一錢韭汁半盞薑汁少許咯血吐血出於腎也加桔梗玄參側柏葉炒各一錢如先血症或吐衄盛大者宜先治血治法輕少者涼血止血盛大者先消瘀血次止之涼之蓋血來多必有瘀於胸膈者不先消化之則止之涼之必不應也葛可久方宜次第檢用內唯獨參湯止可施於大吐血後昏倦脈微細氣虛者氣雖虛而腹有火可加天門冬三四錢或如前所云陰虛火動潮熱盜汗咳嗽脈數者不可用參說見本草集要人參條下蓋此病屬火大便多燥然須節調飲食勿令泄瀉若胃氣復壞泄瀉稀溏則前項寒涼之藥又難用矣急宜調理脾胃用白朮茯苓陳皮半夏神麯麥芽甘草等藥俟胃氣復然後用前本病藥收功後可常服補陰丸及葛可久白鳳膏等藥柴前梅連散十三治骨蒸勞熱三服而除柴胡前胡烏梅胡黃連各等分上每服四錢加豬膽汁一枚豬脊髓一條韭白童便煎服地仙散十四凡人年四十以下患勞怯且不必補只先退潮熱調理可愈此方退潮熱如神方外有接天梯之術宜先用此方地骨皮二錢半防風一錢五分薄荷葉一錢五分甘草梢炙一錢烏梅七分半上用水煎三次午後頓服六味地黃丸十五治腎氣虛損形體憔悴寢汗潮熱發熱五臟齊損瘦弱虛煩骨蒸痿弱下血亦治腎消泄瀉赤白濁俱效山藥薑汁炒四兩山茱萸去核煎肉四兩白茯苓去皮澤瀉去毛牡丹皮去木各三兩懷慶熟地黃酒蒸八兩上為末煉蜜為丸如梧桐子大每服八九十丸空心白湯下加附子制桂心各一兩名八味丸治下部虛寒人參固本丸十六清金補水養血滋陰天門冬去心麥門冬去心生地黃熟地黃俱懷慶者各二兩四味熬膏曬乾取淨末四兩人參去蘆一兩上為末煉蜜為丸如梧桐子大每服八九十丸空心白湯送下按古方四味酒煮搗膏人參末和丸不能用蜜且渣滓滯隔胃弱痰火人用多作痞悶今易此法甚效再加黃柏知母枸杞子各一兩五味子五錢尤妙秋石四精丸十七治腎虛盜汗腰痛秋石童便煎者佳蓮肉去心皮二兩芡實去殼白茯苓去皮堅實者先去皮人乳浸二日上為末紅棗十二兩煮去皮核搗膏為丸如梧桐子大每服八十丸清晨空心酒下一方有山藥薏苡仁小茴香各一兩名七精丸治症同上安神定志丸十八清心肺補脾腎安神定志消痰去熱臺閣勤政勞心燈窗讀書刻苦皆宜服之累用奇效人參一兩五錢白茯苓去皮白茯神去心遠志去心白朮炒石菖蒲去毛忌鐵酸棗仁去殼炒麥門冬去心各一兩牛黃一錢另研辰砂二錢五分草伏水飛另研為衣上為末圓眼肉四兩熬膏和煉蜜三四兩為丸如梧桐子大硃砂為衣每服三十丸清米湯下不拘時日三服八寶丹十丸平調氣血滋補五臟何首烏赤白各一斤竹刀刮去粗皮米泔水浸一宿用黑豆一斗每次三升三合以水泡漲每豆一層在底何首烏一層在上重重鋪畢用砂鍋柳木甑蒸之以豆熟為度揀去豆曬乾又蒸如此九次將何首烏曬乾為末聽用赤茯苓用竹刀刮去粗皮木槌打碎為末用盆盛水將藥傾入盆內其筋膜浮水上者去之沉盆底者留用如此三次濕團為塊就用黑牛乳五碗放砂鍋內慢火煮之候乳盡入茯苓內為度仍曬研為細末淨用一斤白茯苓制如上法用人乳煮候煮乳盡曬乾為末淨用一斤懷慶山藥薑汁炒為末淨用四兩川牛膝去蘆酒浸一宿待何首烏蒸至七次再將牛膝同鋪豆上蒸二次研為細末淨八兩川當歸酒浸一宿曬乾為末淨用八兩破故紙用黑芝麻如數同炒芝麻熟為度去芝麻將故紙研為細末淨四兩甘州枸杞去梗曬乾為末淨用八兩菟絲子去沙土淨酒浸生芽搗為餅曬乾為末淨用八兩一方有杜仲去粗皮薑汁炒斷絲為末淨八兩上藥不犯鐵器各為末稱足和勻煉蜜為丸先丸如彈子大一百五十丸每日三丸空心酒浸下一丸午前薑湯浸下一丸晚下鹽湯浸下一丸余藥丸如梧桐子大每服七八十丸空心鹽湯或酒送下此藥烏須黑髮延年益壽專治陰虛陽弱無子者服半年即令有子神效忌黃白蘿蔔牛肉加味坎離丸二十能生津益血升水降火清心明目蓋此方取天一生水地二生火之意藥輕而功用大久服而取效速王道之藥無出於此上盛而虛之人服之極效川芎大而白者洗淨小的不用當歸全用好酒浸三日洗淨曬乾白芍藥好酒浸一日切片曬乾甘州枸杞子去梗女真實即冬青子冬至日採蜜水拌九蒸九曬淨各四兩懷慶熟地黃八兩一半和砂仁一兩以絹袋盛放罐底用酒二碗煮乾去砂仁不用一半用白茯苓二兩研末如前用酒一碗煮乾去茯苓不用甘菊花去梗葉家園者野菊花不用淨三兩川黃柏去粗皮淨八兩二兩酒浸二兩鹽水浸二兩人乳浸二兩蜜浸各一晝夜曬乾炒茶褐色知母肥大者八兩四兩制與黃柏同上九味修制如法合和一處鋪開日曬夜露二晝夜取天地之精日月之華再為細末煉蜜為丸如梧桐子大每服八九十丸空心滾水打炒鹽湯送下十精丸二十一補虛明目多用極效甘菊花家園者去梗葉石斛去根五加皮去木洗柏子仁去殼炒菟絲子去砂酒煮搗餅曬乾白朮土炒肉蓯蓉去心膜川巴戟去心人參去蘆鹿角膠各二兩上為末將鹿角膠酒化開加煉蜜為丸如梧桐子大每服九十丸空心滾白湯送下太極丸二十二人身五臟範天五行一有不和則為災疾藥有五味各主五臟可使調和故曰太極黃柏屬水主滋腎水苦以堅精去皮鹽酒浸二日炒褐色為末淨三兩六錢知母屬金主清潤肺金苦以降火佐黃柏為金水相生去皮酒浸一宿炒乾為末淨二兩四錢破故紙屬火主收斂神明能使心包之火與命門火相通故元氣堅固骨髓充實蓋澀以去脫也新瓦炒香為末淨二兩八錢胡桃仁屬木主潤血氣凡血屬陰陰惡燥故用油以潤之佐故紙有水火相生之妙方書云黃柏無知母胡桃仁無故紙猶草木之無葉也去皮待各藥末成研如泥淨三兩二錢和入眾藥內砂仁屬土醒脾開胃引眾藥下補丹田香而能竄和合五臟沖和之氣如天地以土為沖也去殼將五錢用川椒一兩同炒透去椒不用又用五錢不炒共為細末淨一兩上五味各製為末如法和勻煉蜜為丸如梧桐子大每服七十丸用滾白湯或酒隨意送下早晚各一服服久效不可言服至終身成地仙矣膏粱痰火人不宜用四靈丹二十三好松脂透明者一斤四兩以無灰好酒砂鍋內桑柴火煮數以竹杖攪稠黏住火以瓦瓶盛水投納結塊又復以酒煮之一日如此九遍煮三日共計二十七遍其脂瑩然如玉入口不苦澀為度搗為細末淨用十二兩凡煮不宜酒少少則易焦酒耗大半即可甘菊花家園味甘者野菊不用去梗葉為末淨用八兩白茯苓去皮筋為末淨八兩柏子仁去殼淨炒去油為末淨用八兩懷慶熟地黃取肥大沉水者曬乾稱八兩足以清酒洗淨蒸半日搗如泥上為末與地黃和勻煉蜜為丸如梧桐子大每服七十二丸空心好酒送下凡修合必擇天醫黃道吉日勿令婦人雞犬見服藥亦擇吉日此方出攝生眾妙方內云是榮陽王都憲所傳公在陝時得之一總戎年九十餘自幼服此方精力倍加胃氣強健飲食日增壽故彌長秘而不傳公懇得之如法修服不間寒暑亦獲奇效滋腎丸二十四平補氣血滋陰降火少年氣血素弱人服極效女人亦宜川芎一兩當歸身酒浸烘乾二兩白芍藥酒炒二兩人參去蘆二兩懷熟地黃二兩甘草炙一兩白朮陳土炒二兩白茯苓去皮二兩黃柏去粗皮童便浸炒二兩知母去皮蜜水拌炒二兩甘州枸杞去梗二兩牛膝去蘆酒洗二兩赤白何首烏黑豆蒸七次各四兩上為末煉蜜為丸如梧桐子大每服九十丸空心淡鹽湯送下大補陰丸二十五溫補下元滋陰降火酒色人年五十以上服之極效川黃柏去粗皮淨四兩一兩鹽酒浸炒一兩蜜水浸炒一兩童便浸炒一兩醋浸炒俱炒褐色勿焦知母去皮四兩四制同黃柏鹿角膠二兩鹿角霜四兩龜板膠二兩龜板霜四兩牛膽槐子淨八兩臘月裝入牛膽至仲春取出聽用女真實即冬青子冬至日採蜜水九蒸九曬四兩虎脛骨一兩酥炙熟地黃懷慶者四兩山茱萸去核二兩北五味子去梗一兩瑣陽一兩乾薑炒透三兩雄豬脊髓一條上為末煉蜜一斤先將龜鹿膠化開和為丸如梧桐子大每服九十丸空心煨鹽湯送下一方有烏藥葉四兩加味瓊玉膏二十六補血益損清金水以滋化源老少虛損極效懷生地黃四斤白朮四兩白茯苓十五兩人參六兩天門冬去心淨半斤麥門冬去心淨半斤甘州枸杞子半斤淨去梗上先以地黃酒洗淨用水四碗浸一晝夜搗取自然汁和蜜三之一以參苓等藥先為末拌入蜜與地黃汁內用瓶貯與紙三十重並箬包其口用桑柴火蒸煮三晝夜取出再換蠟紙包封十數重沉井底一晝夜取起再如前煮半日每日清晨食遠白湯點服清肺健脾養血潤燥須以雞犬不聞處制之其蜜用生絹濾淨地黃勿犯鐵山精丸二十七健脾除熱去火消痰神效蒼朮二斤茅山者先用米泔水浸三日用竹刀刮去粗皮陰乾甘州枸杞一斤去梗桑椹紫熟者一斗取自然汁去渣將蒼朮浸入汁內令透取出曬乾又浸又曬如此者九次用水臼搗為細末地骨皮去木土一斤上並曬為末與蒼朮末和勻煉蜜為丸彈大每服二丸百沸湯下按此方強脾益腎老少俱效還元丹二十八養脾補腎最妙老人尤宜常服脾泄腎泄俱效山藥薑汁炒白茯苓去皮小茴香薏苡仁炒蓮肉去皮心砂仁炒神麯半斤粉草半斤二味共炒一時不可焦上為末用黃牛胎犢一條一斤以下者佳熬膏入糯米粉四兩和成硬糊樣為丸彈子大每服大人二丸小兒一丸飢時飲湯嚼下按此方脾腎要藥功效甚大不能盡述玉拄杖二十九一名一秤金一名小接命填精益腎烏須黑髮延年益壽方士以此為服食沒石子五錢沉香二錢大茴香三錢槐子三兩五加皮三兩枸杞子三兩破故紙新瓦炒三兩懷熟地黃三兩上藥共一斤胡桃肉一斤白糖半斤共為末煉蜜一斤為丸如彈大每服二丸空心鹽湯化下按此補腎為主鬚髮雖不即黑而潤澤不燥尤為妙也西北高燥人宜常服二至丸三十清上補下第一方價廉而功極大常服累有奇效冬至日取冬青子不拘多少陰乾以蜜酒拌透盒一晝夜粗布袋擦去皮曬乾為末新瓦瓶收貯待夏至日取旱蓮草數十斤搗自然汁熬膏和前藥末為丸如梧桐子大每服百丸臨臥時酒送下其功甚大初服便能使老者無夜起之累不旬日使膂力加倍又能變白鬚發為黑理腰膝壯筋骨強陰不走酒色痰火人服尤更奇效天門冬膏三十一滋陰降火清肺補腎充旺元陽昔有一王子單服此膏連生三十二子壽年百歲行步輕健耳目聰明如童子用天門冬揀去枯壞者十五斤用溫水潤透去皮心淨曬乾用淨肉十斤搗碎每斤用水五碗共五十碗入銅鍋慢火煮乾三停之二用布絞淨將渣再搗爛用水三十碗再熬約減大半又以布絞淨去渣不用將前後二汁和一處文武火熬至滴水不散似稀糊樣取起出火毒三日以磁罐收貯封固每日空心上午下午先挑膏半盞在碗內以滾白湯調開服之冬月用酒服有痰用淡薑湯調服大抵此膏最宜酒色過度之人常服極好上焦熱有痰食後多服一次下焦熱小便赤澀空心多服一次按此方肺腎之藥清金補水果妙十珍膏三十二補養血氣調理脾胃清肺滋腎尋常預服調補及大病後調補要藥人參去蘆八兩白朮潔白者佳蒼黑不用淨一斤北五味子去梗四兩川歸身酒洗淨去頭尾烘乾淨用八兩黃耆去蘆梢八兩天門冬去心淨八兩麥門冬去心淨八兩懷生地黃肥大沉水不枯者懷熟地黃肥大沉水不枯者各十兩甘州枸杞子去梗八兩上藥切片制淨入銅鍋內用水浸高於藥二寸文武火熬至藥面上無水以新絞取清汁另放將渣入臼內搗如泥下鍋內仍用水高二寸再熬候藥面上水乾又絞取清汁將渣又搗又熬如此三次以渣無味為度去渣不用將前後三次藥汁再入鍋內文火熬如稀糊樣下煉蜜八兩再熬二三沸收起隔宿必有清水浮上亦宜去之其膏放井水缸內出火毒三日每服半盞滾白湯空心食遠時調服一日二次極有奇效何首烏丸三十三補益腎肝聰耳明目卻病延壽第一藥也何首烏赤白各半不拘多少用砂鍋柳木甑蒸下用紅棗一層中用黑豆一層再安何首烏於豆上又用黑豆一層紅棗一層蓋之慢火蒸半日以豆極爛為度將何首烏乘熱搗碎曬乾為細末每藥末一斤用甘菊花去梗葉另為末二兩和勻以人參固本丸料熬膏和為丸如梧桐子大每服九十九丸空心白湯送下按此方每見合服累有奇效不能盡述經驗何首烏丸三十四專治老人衰弱血氣不足遺尿失禁鬚髮斑白濕熱相駁腰背疼痛齒酸腳軟行步艱難眼目昏花此藥皆可治之久服輕身延年耐久添精補髓益氣強筋修合務要精製無不應效何首烏六兩用黑豆水浸煮七次曬乾再煮又曬如前七次黃柏四兩一兩酒炒一兩乳汁炒一兩童便炒一兩青鹽水炒松子仁去殼淨一半去油一半不去油柏子仁去殼菟絲子酒煮爛碾為末肉蓯蓉酒焙乾淨牛膝酒洗去蘆天門冬去心焙乾白朮淨不用油者去梗麥門冬去心焙乾白茯苓去皮小茴香酒炒甘州枸杞子酒洗炒乾當歸酒洗炒乾白芍藥熟地黃酒洗焙乾生地黃酒洗焙乾以前十五味每味二兩人參去蘆黃耆蜜炙二味各一兩二錢上為細末加核桃仁去殼並仁上粗皮研如泥和煉蜜為丸如梧桐子大每服五十丸空心酒米飲任下半月半效一月全效四制黃柏丸三十五此藥與前藥相兼服用黃柏去粗皮一斤四兩酒炒四兩童便炒四兩乳汁炒四兩青鹽水炒共合為一處每日用乳汁浸曬乾復用乳浸曬無度待臭味甚作無厭至連稱得二斤則內有干乳一斤矣然後為細末煉蜜為丸如梧桐子大每服五七十丸至百丸空心酒下或淡鹽湯下長春丹三十六補益腎肝聰耳明目卻病延壽何首烏用水浸去粗皮竹刀切片赤白各二斤黑豆拌蒸曬九次為末淨二斤仙茅竹刀刮去蘆用粳米泔浸去皮黑豆拌蒸曬九次淨末二斤白茯苓去皮為末水飛去筋取沉底曬乾用粳米鋪底放上蒸三次研淨末一斤茅山蒼朮米泔水浸去粗皮切片老米拌蒸曬九次牛膝去蘆酒浸一宿同何首烏蒸三次淨末各一斤上各為末和勻煉蜜為丸如梧桐子大每服百丸空心滾白湯下忌牛肉蘿蔔蔥蒜按此方即仙茅丸一云加桑椹汁一斤拌蒼朮末尤妙中年以後服極效神仙長春廣嗣丹又名保命延齡丹三十七按此方專治男子五勞七傷顏貌衰朽形體羸瘦中年陽事不舉精神短少未至五旬鬚髮先白左癱右瘓步履艱難婦人下元虛冷久不孕育累經奇驗人參去蘆一兩天門冬去心一兩懷山藥薑汁炒二兩當歸酒洗一兩澤瀉去毛一兩懷生地黃二兩熟地黃二兩川巴戟去心二兩川牛膝去蘆酒浸曬乾二兩山茱萸去核一兩菟絲子酒洗去土仍用酒蒸搗餅曬乾四兩肉蓯蓉酒洗去心膜曬乾三兩遠志去蘆甘草湯泡去心三兩赤石膏另研一兩白茯苓去皮一兩川杜仲去粗皮薑汁炒斷絲二兩甘州枸杞子去梗三兩地骨皮去木洗去土淨二兩車前子去土一兩石菖蒲去毛一十九節者為佳銅刀切片炒一兩柏子仁去殼炒一兩廣木香一兩川椒去目梗閉口者炒出汗淨二兩覆盆子去梗一兩北五味子去梗一兩上藥二十五味合五五之數共為末煉蜜為丸如梧桐子大每服三十丸空心上午下午各用溫酒送下日進三服服藥十日小便雜色是舊疾出也又十日後鼻頭酸言語雄壯胸中疼痛咳嗽吐膿形色不衰是肺病出也一月後腹中一應七情氣滯脾胃勞倦沉寒痼冷諸積皆退百日後容顏不衰鬚髮變黑齒落更生老弱亦能康健目視十里力加百倍行路不倦壽算延長卻病多子此係舊方所載其言似張大靡實不可盡信然觀其藥味固和平之劑也附錄延齡育子丸三十八治少年斫喪中年無子婦人血虛不能孕育此方一料夫婦齊服服盡即孕累經奇驗信非虛言天門冬去心五兩麥門冬去心五兩懷生地黃懷熟地黃肥大沉水者各五兩人參去蘆五兩甘州枸杞子去梗菟絲子洗淨酒蒸搗餅曬乾五兩川巴戟去心五兩川牛膝去蘆酒洗淨五兩白朮陳土炒五兩白茯苓去皮牛乳浸曬五兩白茯神去皮心人乳浸曬五兩鹿角膠真者五兩鹿角霜五兩柏子仁炒去殼淨五兩山藥薑汁炒五兩山茱萸去核淨五兩肉蓯蓉去內心膜五兩蓮蕊開者不用淨五兩沙苑蒺藜炒五兩酸棗仁炒淨二兩北五味子去梗二兩石斛去根二兩遠志去蘆甘草燈心湯泡去心淨二兩上藥二十四味合二十四氣一百單八兩合一年氣候之成數為生生不息之妙各制淨為末將鹿膠以酒化開和煉蜜為丸如梧桐子大每服男人九十丸婦人八十丸空心滾白湯下忌煎炙蔥蒜蘿蔔按此方南人服效秘傳六神丸三十九固真育子累有奇效生芡實大者五十個去殼龍骨煅五錢蓮蕊須未開者佳漸採漸曬勿令器淨用四兩山茱萸鮮紅者去核淨肉三兩覆盆子淨二兩沙苑蒺藜炒四兩要真者假的五兩上先將蒺藜搗碎水熬膏濾去渣其渣仍曬乾和眾藥為末煉蜜和蒺藜膏為丸如梧桐子大每服九十丸空心煨鹽湯下按此方北人服效用者察之延齡育子龜鹿二仙膠四十此方試極效專治男婦真元虛損久不孕育或多女少男服此膠百日即有孕生男應驗神速並治男子酒色過度消鑠真陰婦人七情傷損血氣諸虛百損五勞七傷並皆治之鹿角用新鮮麋鹿殺角解的不用馬鹿角不用去角腦梢骨二寸絕斷劈開淨用十斤龜板去弦洗淨五斤搗碎上二味袋盛放長流水內浸三日用鉛壇一隻如無鉛壇底下放鉛一大片亦可將角並板放入壇內用水浸高三五寸黃蠟三兩封口放大鍋內桑柴火煮七晝夜煮時壇內一日添熱水一次勿令沸起鍋內一日夜添水五次候角酥取出洗濾淨去渣其渣即鹿角霜龜板霜也將清汁另放外用人參十五兩枸杞子三十兩用銅鍋以水三十六碗熬至藥面無水以新布絞取清汁將渣石臼水槌搗細用水二十四碗又熬如前又濾又搗又熬如此三次以渣無味為度將前龜鹿汁並參杞汁和入鍋內文火熬至滴水成珠不散乃成膠也候至初十日起日曬夜露至十七日七日夜滿採日精月華之氣如本月陰雨缺幾日下月補曬如數放陰涼處風乾每服初一錢五分十日加五分加至三錢止空心酒化下此方專主無子全要精專常服乃可往往服藥者或日旬之間藥未入口先汲汲於速效雖秦越人之妙劑當亦弗如是也此不可不知秋石乳酥丸四十一補氣養血接真元降陰火生腎水此以真補真之妙藥也乳粉曬乾四兩曬法取人乳若干即下銅鍋內煎熬成膏用大磁盆盛於烈日中曬之盆下用水乃未濟之妙也否則永曬不幹天門冬去心四兩秋石半斤煉法見前同乳粉收秋露數晚曬乾聽用白茯苓一斤去皮為末水淘去筋膜沉底者曬乾淨半斤麥門冬去心四兩人參去蘆四兩懷生熟地黃各四兩酒洗烘乾不犯鐵甘州枸杞子去梗四兩上為末煉蜜為丸如梧桐子大每服三十丸空心滾湯送下好酒亦可按此方男女血虛成癆者服效小接命丹四十二治男婦氣血衰弱痰火上升虛損困憊飲食少進並治左癱右瘓中風不語手足腰膝身體疼痛動履不便極效用人乳二酒盞香甜白者佳好梨搗汁一酒盞傾放鏇或銅鏇內入湯鍋頓滾有黃沫起開青路為度每日空心一服能消痰補虛生血乃以人補人其效無加其中風不語半身不遂曾照此方治好數人長春真人保命服食四十三治諸虛百損五癆七傷四肢無力手足頑麻血氣虛耗面黃肌瘦陽事不舉眩暈噁心飲食少減此方能補諸虛添精益髓滋潤皮膚充壯神氣身體輕健開胃進食返老還童發白再黑齒落更生顏貌如童大有神效白茯苓去皮天門冬去心山藥薑汁炒懷熟地黃何首烏忌鐵照前蒸曬九次枸杞子甘州者去梗各淨四兩乾薑煨二兩小茴香炒一兩青鹽少許蓮肉去皮心半斤麥門冬去心四兩鹿角膠四兩鹿角霜四兩破故紙四兩麻油一兩炒大核桃去殼並皮半斤沒石子十個旱蓮草曬乾淨末一斤新粟米一升為末用牛乳二斤拌米粉煮作糊丸藥上為細末以前米糊為丸如彈大每丸濕重五錢干約三錢每服一丸滾白湯調化服日二服不拘在家在外少者一服老者二服男女皆同按此方補虛養胃雖三五日不食亦不飢不渴補血順氣藥酒方四十四清肺滋腎和五臟通血脈天門冬去心麥門冬去心各四兩懷生熟地黃肥大沉水枯朽不用各半斤人參去蘆白茯苓去皮甘州枸杞子去梗各二兩砂仁七錢木香五錢沉香三錢上用瓦壇盛無灰好酒三十斤將藥切片以絹袋盛放壇內浸三日文武火煮半時以酒黑色為度如熱去木香減人參五錢如下虛或寒將韭子炒黃色為細末空心用酒三五盞每盞挑韭末一銅錢飲之婦人下虛無子久飲亦能生子用核桃連皮過口此藥甚平和治癆疾補虛損烏鬚髮久服貌如童子忌黃白蘿蔔蔥蒜否則令人鬚髮易白許真人神驗椒丹四十五專治五癆七傷諸虛百損並治諸蟲積暖下元用真正川椒二斤半揀去枝目用釜一隻覆於地上四圍用刀畫記去釜用炭火燒紅其地用米醋潑地將紙攤椒在上以釜蓋之良久取出為末用煉蜜一斤四兩為丸如梧桐子大每服十五丸空心酒下半年加至二十丸一年後加至二十五丸止忌五辛蔥蒜余無所忌其椒切勿用閉口者八仙早朝糕四十六專補脾胃虛弱膨悶泄瀉不思飲食服之神效白朮炒四兩白茯苓去皮二兩陳皮去白二兩山藥薑汁炒四兩蓮肉去皮心四兩薏苡仁炒四兩芡實去殼淨四兩人參去蘆二兩桔梗炒乾一兩上為末白粳米五升半糯米二升共七升半同粉共藥和勻用蜜三斤如無蜜沙糖四斤代之拌勻如做糕法入籠中畫片蒸熟焙乾瓦罐封貯飢時取三五片食之白湯漱口小兒用加山楂肉四兩麥芽面四兩去人參按此方不拘男女大小皆可用出外甚便養元辟穀丹四十七安五臟消百病和脾胃補虛損固元氣實精髓能令瘦者肥老者健常服極效用黃犍牛肉不拘多少去筋膜切作棋子大片用河水洗數遍令血味盡仍用河水浸一宿次日再洗一二遍水清為度用無灰好酒入瓦壇內重泥封固用桑柴文武火煮一夜取出焙乾為末如黃沙色者佳焦黑無用牛末一斤加入後藥二斤為則蓮肉蔥鹽炒去蔥鹽用芡實粉去殼淨山藥切片用蔥鹽炒黃去蔥鹽不用粳米炒黃淨取粉五斤半薏苡仁炒白茯苓去皮為末水浮去筋曬乾用白朮潔白者黃黑色不用陳土炒黃去土淨白扁豆薑汁炒各半斤人參去蘆四兩小茴香去枝梗炒四兩乾薑炒四兩砂仁炒二兩川椒去目去閉口者一兩青鹽四兩甘草炙四兩烏梅肉二兩熬去渣半瓶上藥為末與粉米同末和勻外用小紅棗五斤陳年醇酒五斤煮紅棗極爛去皮核搗膏加煉蜜二斤半共和為丸如彈大每次二丸不拘冷熱湯水嚼下一日服三五次永不飢按此方實王道之妙用平時預合荒亂之時可以避難濟飢雖一兩月不食不損胃中元氣寶之寶之如渴只飲冷水辟穀休糧方四十八此方亦平和有理但未經試大豆五升淘淨去皮蒸三次為細末大麻子五升湯浸一宿濾出蒸三次令口開去皮為末糯米五升淘淨共白茯苓一處蒸熟曬乾為末白茯苓去皮同糯米蒸熟曬乾為末上將麻仁米一處搗爛如泥漸入豆黃末同和勻團如拳大再入甑蒸從酉時上火子末住火寅時取出辰至午曬乾磨為末服之以飽為度不得吃一切物用麻子汁下第一頓一月不飢第二頓四十日不飢第三頓一千日不飢第四頓永遠不飢顏色日增氣力倍加如渴飲麻仁汁轉更不渴且能滋潤五臟若欲吃食時用葵子三合為末煎湯放冷服之解其藥後初間吃白米粥湯三日一日四五次每次少少飲之三日後諸般飲食無避忌服此藥不食時大忌欲事餘外不忌此神仙度世之大寶也
